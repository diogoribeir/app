name: Publicar apps no GitHub Pages

# Publica os apps no GitHub Pages:
#   raiz do site      -> dias-sem-doenca (URL antiga preservada)
#   /roteiro-paris/   -> planejador da viagem a Paris
# Roda automaticamente quando um app muda no master, e pode ser
# disparado manualmente na aba Actions (botao "Run workflow").

on:
  push:
    branches: [master]
    paths:
      - "dias-sem-doenca/**"
      - "roteiro-paris/**"
      - "paris-planner/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (liga automaticamente se preciso)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Montar o site (dias-sem-doenca na raiz + roteiro-paris + paris-planner)
        run: |
          mkdir -p _site/roteiro-paris _site/paris-planner
          cp -r dias-sem-doenca/. _site/
          cp -r roteiro-paris/. _site/roteiro-paris/
          cp -r paris-planner/. _site/paris-planner/

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
