name: Publicar app no GitHub Pages

# Publica a pasta dias-sem-doenca como o site (raiz do GitHub Pages).
# Roda automaticamente quando o app muda no master, e pode ser
# disparado manualmente na aba Actions (botao "Run workflow").

on:
  push:
    branches: [master]
    paths:
      - "dias-sem-doenca/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (liga automaticamente se preciso)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o app
        uses: actions/upload-pages-artifact@v3
        with:
          path: dias-sem-doenca

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
