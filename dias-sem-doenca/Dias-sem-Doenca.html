<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1E2E26" />
  <title>Dias sem Doença — Di &amp; Tati</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
/* Dias sem Doença — identidade "farmácia caseira": sage + floresta + mel + coral */
:root{
  --paper:#ECEFE8; --card:#FBFCF8; --ink:#17241E; --muted:#5F6F65; --line:#DCE2D6;
  --good:#2E8B57; --good-soft:#DEEEE3; --bad:#CE5439; --bad-soft:#F6E1DA;
  --honey:#B98A2E;
  --hero-bg:#1E2E26; --hero-bg2:#26382E; --hero-ink:#F2EFE4; --hero-accent:#E7B54E; --hero-alert:#E27A5A;
  --shadow:0 6px 20px rgba(21,40,31,.10);
  --r:20px;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#0F1512; --card:#18211C; --ink:#E8EEE6; --muted:#93A399; --line:#273128;
    --good:#57B885; --good-soft:#16281E; --bad:#E8735A; --bad-soft:#2A1A15;
    --honey:#E0B357;
    --hero-bg:#16211C; --hero-bg2:#1E2C24; --hero-ink:#F2EFE4; --hero-accent:#E7B54E; --hero-alert:#E8735A;
    --shadow:0 6px 20px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --paper:#ECEFE8; --card:#FBFCF8; --ink:#17241E; --muted:#5F6F65; --line:#DCE2D6;
  --good:#2E8B57; --good-soft:#DEEEE3; --bad:#CE5439; --bad-soft:#F6E1DA; --honey:#B98A2E;
  --hero-bg:#1E2E26; --hero-bg2:#26382E; --hero-ink:#F2EFE4; --hero-accent:#E7B54E; --hero-alert:#E27A5A;
  --shadow:0 6px 20px rgba(21,40,31,.10);
}
:root[data-theme="dark"]{
  --paper:#0F1512; --card:#18211C; --ink:#E8EEE6; --muted:#93A399; --line:#273128;
  --good:#57B885; --good-soft:#16281E; --bad:#E8735A; --bad-soft:#2A1A15; --honey:#E0B357;
  --hero-bg:#16211C; --hero-bg2:#1E2C24; --hero-ink:#F2EFE4; --hero-accent:#E7B54E; --hero-alert:#E8735A;
  --shadow:0 6px 20px rgba(0,0,0,.35);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background:var(--paper); color:var(--ink);
  min-height:100%; display:flex; flex-direction:column;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* topo */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
.brand{font-size:1.05rem;font-weight:800;letter-spacing:.01em;display:flex;align-items:center;gap:7px}
.brand .mark{color:var(--honey)}
.icon-btn{
  background:var(--card);border:1px solid var(--line);color:var(--ink);
  width:38px;height:38px;border-radius:12px;font-size:1.3rem;line-height:1;cursor:pointer;
  box-shadow:var(--shadow)
}

.wrap{flex:1;display:flex;flex-direction:column;gap:14px;padding:4px 14px 10px;max-width:560px;width:100%;margin:0 auto}

/* placar do casal (resumo) */
.couple{
  background:linear-gradient(150deg,var(--hero-bg),var(--hero-bg2));
  color:var(--hero-ink);border-radius:24px;padding:18px 18px 16px;text-align:center;
  box-shadow:var(--shadow);position:relative;overflow:hidden
}
.couple::after{content:"";position:absolute;inset:0;border-radius:24px;border:1px solid rgba(231,181,78,.18);pointer-events:none}
.couple .eyebrow{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;opacity:.75;font-weight:700}
.couple .big{font-size:clamp(3.2rem,17vw,4.4rem);line-height:.95;font-weight:800;color:var(--hero-accent);margin:6px 0 2px}
.couple.alert .big{color:var(--hero-alert)}
.couple .label{font-size:.9rem;opacity:.92}
.couple .record{margin-top:10px;display:inline-block;font-size:.72rem;letter-spacing:.02em;
  background:rgba(231,181,78,.15);color:var(--hero-accent);border:1px solid rgba(231,181,78,.3);
  padding:4px 12px;border-radius:999px;font-weight:700}
.couple.alert .record{background:rgba(226,122,90,.16);color:var(--hero-alert);border-color:rgba(226,122,90,.35)}

/* pessoas (detalhe) */
.people{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.person{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 12px 12px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;text-align:center;position:relative
}
.person::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 4px 4px 0;background:var(--good)}
.person.sick::before{background:var(--bad)}
.person .name{font-size:1.05rem;font-weight:800}
.chip{font-size:.64rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin-top:5px}
.chip.ok{background:var(--good-soft);color:var(--good)}
.chip.bad{background:var(--bad-soft);color:var(--bad)}
.person .count{font-size:2.7rem;line-height:1;font-weight:800;color:var(--good);margin:8px 0 0}
.person.sick .count{color:var(--bad)}
.person .unit{color:var(--muted);font-size:.72rem;letter-spacing:.02em}
.person .ill{font-size:.74rem;color:var(--bad);margin-top:6px;line-height:1.25;max-width:100%;overflow-wrap:anywhere}
.person .ill b{font-weight:800}
.person .rec{font-size:.66rem;color:var(--muted);margin-top:5px}

.btn{
  border:0;border-radius:13px;padding:11px 10px;font-size:.9rem;font-weight:800;
  cursor:pointer;color:#fff;width:100%;margin-top:11px;letter-spacing:.01em
}
.btn.danger{background:var(--bad)} .btn.ok{background:var(--good)}
.btn:active{filter:brightness(.94)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.hist-link{background:none;border:0;color:var(--muted);font-size:.7rem;margin-top:9px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

.footer{max-width:560px;margin:0 auto;padding:2px 16px 16px;width:100%;text-align:center}
.tag{font-size:.68rem;color:var(--good);background:var(--good-soft);padding:3px 12px;border-radius:999px;letter-spacing:.04em}
.tag.warn{color:var(--bad);background:var(--bad-soft)}

/* tela de login (modo compartilhado) */
.login{position:fixed;inset:0;z-index:80;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px}
.login.hidden{display:none}
.login-box{width:100%;max-width:360px;text-align:center}
.login-mark{font-size:2.4rem;color:var(--honey);line-height:1}
.login-box h1{font-size:1.5rem;font-weight:800;margin:8px 0 4px}
.login-box form{margin-top:16px;text-align:left}
.login-box label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:.02em;margin:12px 0 5px}
.login-box input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:1rem;background:var(--card);color:var(--ink);font-family:inherit}
.login-box input:focus-visible{outline:2px solid var(--good);outline-offset:1px;border-color:var(--good)}
.login-box .btn{margin-top:18px}
.login-error{color:var(--bad);font-size:.82rem;margin:12px 0 0;font-weight:600}

/* modais (bottom sheet) */
.modal{position:fixed;inset:0;background:rgba(10,18,14,.55);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.modal.hidden{display:none}
.modal-box{
  background:var(--card);color:var(--ink);width:100%;max-width:560px;border-radius:24px 24px 0 0;
  padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.25);
  max-height:86vh;overflow:auto;animation:up .22s ease
}
@media (prefers-reduced-motion:reduce){.modal-box{animation:none}}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.modal-box h2{margin:0 0 12px;font-size:1.2rem;font-weight:800}
.modal-box label{display:block;font-size:.78rem;color:var(--muted);margin:12px 0 5px;font-weight:700;letter-spacing:.02em}
.modal-box input[type=text],.modal-box input[type=date]{
  width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:1rem;
  background:var(--paper);color:var(--ink);font-family:inherit
}
.modal-box input:focus-visible{outline:2px solid var(--good);outline-offset:1px;border-color:var(--good)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{margin-top:0}
.muted{color:var(--muted);font-size:.9rem;margin:0}

.menu-list{display:flex;flex-direction:column;gap:8px}
.menu-item{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;
  background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;color:var(--ink);font-family:inherit}
.menu-item span{font-weight:800;font-size:.95rem}
.menu-item small{color:var(--muted);font-size:.74rem}
.menu-item.danger-text span{color:var(--bad)}
.share-text{width:100%;margin-top:10px;padding:12px;border:1.5px solid var(--line);border-radius:12px;
  font-size:.95rem;background:var(--paper);color:var(--ink);font-family:inherit;resize:none;line-height:1.5}

.log{list-style:none;padding:0;margin:6px 0 0}
.log li{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line);border-left:4px solid var(--good);border-radius:12px;padding:10px 12px;margin:8px 0;font-size:.9rem}
.log .info{flex:1;min-width:0}
.log .info b{font-weight:800}
.log .d{color:var(--muted);font-size:.76rem;margin-top:2px}
.log .empty{color:var(--muted);font-style:italic;border:0;padding-left:0}
.log .del{background:var(--bad-soft);color:var(--bad);border:0;border-radius:10px;padding:7px 11px;font-weight:800;cursor:pointer;font-size:.9rem;flex-shrink:0}
:focus-visible{outline:2px solid var(--good);outline-offset:2px}
.log .edit{background:var(--good-soft);color:var(--good);border:0;border-radius:10px;padding:7px 10px;cursor:pointer;font-size:.9rem;flex-shrink:0;margin-right:2px}
.fixlink{background:none;border:0;color:var(--bad);text-decoration:underline;cursor:pointer;font:inherit;font-size:.7rem;padding:0 2px}

  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="mark">✚</span> Dias sem Doença</div>
    <button id="menuBtn" class="icon-btn" aria-label="Opções">⋯</button>
  </header>

  <main class="wrap">
    <section id="coupleCard" class="couple"></section>
    <div class="people">
      <section class="person" data-id="di"></section>
      <section class="person" data-id="tati"></section>
    </div>
  </main>

  <footer class="footer"><span id="statusTag" class="tag">funciona offline</span></footer>

  <!-- Modal: registrar doença -->
  <div id="sickModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2 id="sickTitle">Registrar doença</h2>
      <label for="sickName">Qual doença?</label>
      <input id="sickName" type="text" placeholder="Ex.: gripe, virose, dor de garganta" autocomplete="off" />
      <label for="sickNote">Observação (opcional)</label>
      <input id="sickNote" type="text" placeholder="Ex.: febre, foi ao médico..." autocomplete="off" />
      <label for="sickDate">Começou em</label>
      <input id="sickDate" type="date" />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Cancelar</button>
        <button id="sickConfirm" class="btn danger">Marcar como doente</button>
      </div>
    </div>
  </div>

  <!-- Modal: recuperação -->
  <div id="wellModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2 id="wellTitle">Marcar recuperação</h2>
      <p id="wellInfo" class="muted"></p>
      <label for="wellDate">Recuperou em</label>
      <input id="wellDate" type="date" />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Cancelar</button>
        <button id="wellConfirm" class="btn ok">Recuperado! 🎉</button>
      </div>
    </div>
  </div>

  <!-- Modal: histórico -->
  <div id="histModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2 id="histTitle">Histórico</h2>
      <ul id="histList" class="log"></ul>
      <div class="modal-actions">
        <button class="btn ghost" data-close>Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: editar registro do histórico -->
  <div id="histEditModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2>Corrigir registro</h2>
      <label for="heName">Doença</label>
      <input id="heName" type="text" autocomplete="off" />
      <label for="heNote">Observação</label>
      <input id="heNote" type="text" autocomplete="off" />
      <label for="heStart">Começou em</label>
      <input id="heStart" type="date" />
      <label for="heEnd">Recuperou em</label>
      <input id="heEnd" type="date" />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Cancelar</button>
        <button id="heSave" class="btn ok">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: menu / backup -->
  <div id="menuModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2>Opções</h2>
      <div class="menu-list">
        <button id="shareBtn" class="menu-item"><span>📤 Compartilhar situação</span><small>Envia um resumo de como está agora</small></button>
        <button id="exportBtn" class="menu-item"><span>⬇️ Salvar backup</span><small>Baixa um arquivo com todos os dados</small></button>
        <button id="importBtn" class="menu-item"><span>⬆️ Restaurar backup</span><small>Carrega os dados de um arquivo salvo</small></button>
        <button id="resetBtn" class="menu-item danger-text"><span>🗑️ Reiniciar tudo</span><small>Apaga histórico e zera os contadores</small></button>
      </div>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: compartilhar situação -->
  <div id="shareModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2>Compartilhar situação</h2>
      <p class="muted">Um resumo de como está agora. Envie por WhatsApp ou copie.</p>
      <textarea id="shareText" class="share-text" readonly rows="6"></textarea>
      <div class="modal-actions">
        <button class="btn ghost" data-close>Fechar</button>
        <button id="shareCopy" class="btn ok">Copiar</button>
      </div>
    </div>
  </div>
  <script>
/* Dias sem Doença — Di & Tati.
   Sincronização igual aos outros apps: Realtime Database do casal (REST),
   gaveta planos/dias-sem-doenca-dt2026 — SEM login. localStorage é a cópia
   offline (e a origem da migração: a 1ª abertura sobe os dados atuais). */

(function () {
  "use strict";

  var STORAGE_KEY = "ddsd_v2";
  var SYNC_URL = "https://apps-4b887-default-rtdb.firebaseio.com/planos/dias-sem-doenca-dt2026";
  var DAY = 86400000;

  // ---------- estado ----------
  function defaultState() {
    var now = Date.now();
    function person(name) {
      return { name: name, status: "healthy", streakStart: now, illness: null, records: [], best: 0 };
    }
    return { people: { di: person("Di"), tati: person("Tati") }, coupleBest: 0 };
  }
  function valid(s) { return s && s.people && s.people.di && s.people.tati; }
  function readLocal() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem("ddsd_v1");
      if (!raw) return defaultState();
      var s = JSON.parse(raw);
      if (!valid(s)) return defaultState();
      if (typeof s.coupleBest !== "number") s.coupleBest = 0;
      return s;
    } catch (e) { return defaultState(); }
  }
  function writeLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }

  var state = readLocal();
  var cloudOK = false;
  var syncStamp = 0;

  // grava local + nuvem
  function commit() {
    writeLocal();
    fetch(SYNC_URL + "/state.json", { method: "PUT", body: JSON.stringify(state) })
      .then(function () {
        cloudOK = true; syncStamp = Date.now();
        fetch(SYNC_URL + "/_at.json", { method: "PUT", body: JSON.stringify(syncStamp) }).catch(function(){});
        setStatus();
      })
      .catch(function () { cloudOK = false; setStatus(); });
  }
  function boot() {
    fetch(SYNC_URL + "/state.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (v) {
        cloudOK = true;
        if (valid(v)) {
          state = v;
          if (typeof state.coupleBest !== "number") state.coupleBest = 0;
          writeLocal();
        } else {
          commit();                      // 1ª vez: sobe os dados deste aparelho
        }
        render();
      })
      .catch(function () { cloudOK = false; setStatus(); });
    fetch(SYNC_URL + "/_at.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (v) { if (typeof v === "number") syncStamp = v; }).catch(function(){});
  }
  function setStatus() {
    var el = document.getElementById("statusTag");
    if (!el) return;
    if (cloudOK) { el.textContent = "sincronizado ✓"; el.className = "tag"; }
    else { el.textContent = "offline — salva no aparelho"; el.className = "tag warn"; }
  }

  // ---------- datas / util ----------
  function startOfDay(ts) { var d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); }
  function daysBetween(a, b) { return Math.max(0, Math.floor((startOfDay(b) - startOfDay(a)) / DAY)); }
  function fmtDate(ts) { return new Date(ts).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" }); }
  function dias(n) { return n === 1 ? "dia" : "dias"; }
  function dateInputToTs(v) { if (!v) return Date.now(); var p = v.split("-"); return new Date(+p[0], +p[1] - 1, +p[2], 12, 0, 0).getTime(); }
  function tsToDateInput(ts) { var d = new Date(ts); return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2); }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }

  // ---------- render ----------
  var coupleEl = document.getElementById("coupleCard");

  function render() {
    var now = Date.now(), di = state.people.di, tati = state.people.tati;
    [["di", di], ["tati", tati]].forEach(function (pair) {
      var p = pair[1];
      if (p.status === "healthy") { var d = daysBetween(p.streakStart, now); if (d > (p.best || 0)) p.best = d; }
      renderPerson(pair[0], p, now);
    });

    var anySick = di.status === "sick" || tati.status === "sick";
    if (!anySick) {
      var cd = daysBetween(Math.max(di.streakStart, tati.streakStart), now);
      if (cd > (state.coupleBest || 0)) state.coupleBest = cd;
      coupleEl.className = "couple";
      coupleEl.innerHTML =
        '<div class="eyebrow">Di &amp; Tati · juntos</div>' +
        '<div class="big num">' + cd + '</div>' +
        '<div class="label">' + dias(cd) + ' sem ninguém doente</div>' +
        '<div class="record">🏆 recorde do casal: ' + (state.coupleBest || 0) + ' ' + dias(state.coupleBest || 0) + '</div>';
    } else {
      var who = [];
      if (di.status === "sick") who.push("Di");
      if (tati.status === "sick") who.push("Tati");
      coupleEl.className = "couple alert";
      coupleEl.innerHTML =
        '<div class="eyebrow">Di &amp; Tati · juntos</div>' +
        '<div class="big num">0</div>' +
        '<div class="label">' + who.join(" e ") + (who.length > 1 ? " estão doentes 🤒" : " está doente 🤒") + '</div>' +
        '<div class="record">🏆 recorde do casal: ' + (state.coupleBest || 0) + ' ' + dias(state.coupleBest || 0) + '</div>';
    }
    writeLocal();
    setStatus();
  }

  function renderPerson(id, p, now) {
    var el = document.querySelector('.person[data-id="' + id + '"]');
    if (!el) return;
    var hist = '<button class="hist-link" data-act="hist">Histórico (' + p.records.length + ')</button>';
    if (p.status === "healthy") {
      var d = daysBetween(p.streakStart, now);
      el.className = "person";
      el.innerHTML =
        '<div class="name">' + esc(p.name) + '</div><span class="chip ok">saudável</span>' +
        '<div class="count num">' + d + '</div><div class="unit">' + dias(d) + ' sem doença</div>' +
        '<div class="rec">recorde: ' + (p.best || 0) + ' ' + dias(p.best || 0) + '</div>' +
        '<button class="btn danger" data-act="sick">Ficou doente 🤒</button>' + hist;
    } else {
      var sd = daysBetween(p.illness.startedAt, now);
      var note = p.illness.note ? " · " + esc(p.illness.note) : "";
      el.className = "person sick";
      el.innerHTML =
        '<div class="name">' + esc(p.name) + '</div><span class="chip bad">doente</span>' +
        '<div class="count num">' + sd + '</div><div class="unit">' + dias(sd) + ' doente</div>' +
        '<div class="ill"><b>' + esc(p.illness.name) + '</b>' + note +
          ' <button class="fixlink" data-act="fixill">corrigir ✏️</button></div>' +
        '<button class="btn ok" data-act="well">Sarou 🎉</button>' + hist;
    }
  }

  // ---------- modais ----------
  var sickModal = document.getElementById("sickModal");
  var wellModal = document.getElementById("wellModal");
  var histModal = document.getElementById("histModal");
  var menuModal = document.getElementById("menuModal");
  var histEditModal = document.getElementById("histEditModal");
  var pendingId = null;
  var fixingIllness = false;   // sickModal em modo correção (não zera nada)
  var editRecIdx = null;       // índice do registro do histórico em edição

  function openSick(id, fix) {
    pendingId = id;
    fixingIllness = !!fix;
    var p = state.people[id];
    document.getElementById("sickTitle").textContent =
      (fix ? "Corrigir doença — " : "Registrar doença — ") + p.name;
    document.getElementById("sickConfirm").textContent = fix ? "Salvar correção" : "Marcar como doente";
    document.getElementById("sickName").value = fix ? p.illness.name : "";
    document.getElementById("sickNote").value = fix ? (p.illness.note || "") : "";
    document.getElementById("sickDate").value = tsToDateInput(fix ? p.illness.startedAt : Date.now());
    sickModal.classList.remove("hidden");
    setTimeout(function () { document.getElementById("sickName").focus(); }, 50);
  }
  function openWell(id) {
    pendingId = id;
    var p = state.people[id];
    document.getElementById("wellTitle").textContent = "Recuperação — " + p.name;
    document.getElementById("wellInfo").textContent = "Doença atual: " + p.illness.name + " (desde " + fmtDate(p.illness.startedAt) + ").";
    document.getElementById("wellDate").value = tsToDateInput(Date.now());
    wellModal.classList.remove("hidden");
  }
  function openHist(id) {
    pendingId = id;
    document.getElementById("histTitle").textContent = "Histórico — " + state.people[id].name;
    renderHistList(id);
    histModal.classList.remove("hidden");
  }
  function renderHistList(id) {
    var p = state.people[id], listEl = document.getElementById("histList");
    if (!p.records.length) { listEl.innerHTML = '<li class="empty">Nenhuma doença registrada ainda 🙌</li>'; return; }
    listEl.innerHTML = p.records.map(function (r, i) {
      var dur = daysBetween(r.startedAt, r.recoveredAt);
      var note = r.note ? " — " + esc(r.note) : "";
      return '<li><div class="info"><b>' + esc(r.name) + '</b>' + note +
        '<div class="d">' + fmtDate(r.startedAt) + " → " + fmtDate(r.recoveredAt) + " · " + dur + " " + dias(dur) + ' doente</div></div>' +
        '<button class="edit" data-editrec="' + i + '" aria-label="Editar">✏️</button>' +
        '<button class="del" data-del="' + i + '" aria-label="Excluir">✕</button></li>';
    }).join("");
  }
  function openHistEdit(i) {
    editRecIdx = i;
    var r = state.people[pendingId].records[i];
    document.getElementById("heName").value = r.name;
    document.getElementById("heNote").value = r.note || "";
    document.getElementById("heStart").value = tsToDateInput(r.startedAt);
    document.getElementById("heEnd").value = tsToDateInput(r.recoveredAt);
    histModal.classList.add("hidden");
    histEditModal.classList.remove("hidden");
  }
  function closeModals() {
    Array.prototype.forEach.call(document.querySelectorAll(".modal"), function (m) { m.classList.add("hidden"); });
    pendingId = null; fixingIllness = false; editRecIdx = null;
  }

  document.querySelector(".people").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-act]"); if (!btn) return;
    var id = e.target.closest("[data-id]").getAttribute("data-id");
    var act = btn.getAttribute("data-act");
    if (act === "sick") openSick(id, false);
    else if (act === "fixill") openSick(id, true);
    else if (act === "well") openWell(id);
    else if (act === "hist") openHist(id);
  });

  document.getElementById("sickConfirm").addEventListener("click", function () {
    if (!pendingId) return;
    var name = document.getElementById("sickName").value.trim();
    if (!name) { document.getElementById("sickName").focus(); return; }
    var p = state.people[pendingId];
    var startedAt = dateInputToTs(document.getElementById("sickDate").value);
    if (fixingIllness && p.illness) {
      // só corrige os dados da doença atual — não mexe em contador nem histórico
      p.illness.name = name;
      p.illness.note = document.getElementById("sickNote").value.trim();
      p.illness.startedAt = startedAt;
    } else {
      var streak = daysBetween(p.streakStart, startedAt);
      if (streak > (p.best || 0)) p.best = streak;
      p.status = "sick";
      p.illness = { name: name, note: document.getElementById("sickNote").value.trim(), startedAt: startedAt };
    }
    closeModals(); render(); commit();
  });

  document.getElementById("wellConfirm").addEventListener("click", function () {
    if (!pendingId) return;
    var p = state.people[pendingId]; if (!p.illness) { closeModals(); return; }
    var rec = dateInputToTs(document.getElementById("wellDate").value);
    if (rec < p.illness.startedAt) rec = p.illness.startedAt;
    p.records.push({ name: p.illness.name, note: p.illness.note, startedAt: p.illness.startedAt, recoveredAt: rec });
    p.status = "healthy"; p.streakStart = rec; p.illness = null;
    closeModals(); render(); commit();
  });

  // histórico: editar / excluir
  document.getElementById("histList").addEventListener("click", function (e) {
    var ed = e.target.closest("[data-editrec]");
    if (ed && pendingId) { openHistEdit(+ed.getAttribute("data-editrec")); return; }
    var del = e.target.closest("[data-del]"); if (!del || !pendingId) return;
    var i = +del.getAttribute("data-del"), p = state.people[pendingId];
    if (confirm('Excluir o registro de "' + p.records[i].name + '"?')) {
      p.records.splice(i, 1); renderHistList(pendingId); render(); commit();
    }
  });

  document.getElementById("heSave").addEventListener("click", function () {
    if (pendingId == null || editRecIdx == null) { closeModals(); return; }
    var name = document.getElementById("heName").value.trim();
    if (!name) { document.getElementById("heName").focus(); return; }
    var r = state.people[pendingId].records[editRecIdx];
    r.name = name;
    r.note = document.getElementById("heNote").value.trim();
    r.startedAt = dateInputToTs(document.getElementById("heStart").value);
    r.recoveredAt = dateInputToTs(document.getElementById("heEnd").value);
    if (r.recoveredAt < r.startedAt) r.recoveredAt = r.startedAt;
    var keep = pendingId;
    histEditModal.classList.add("hidden");
    editRecIdx = null;
    render(); commit();
    openHist(keep);   // volta pro histórico atualizado
  });

  // ---------- menu / compartilhar / backup ----------
  document.getElementById("menuBtn").addEventListener("click", function () { menuModal.classList.remove("hidden"); });

  function personLine(p, now) {
    if (p.status === "healthy") {
      var d = daysBetween(p.streakStart, now);
      return "• " + p.name + ": " + d + " " + dias(d) + " sem doença";
    }
    var sd = daysBetween(p.illness.startedAt, now);
    return "• " + p.name + ": doente 🤒 " + p.illness.name + " — " + sd + " " + dias(sd);
  }
  function summaryText() {
    var now = Date.now(), di = state.people.di, tati = state.people.tati, couple;
    if (di.status === "sick" || tati.status === "sick") {
      var who = [];
      if (di.status === "sick") who.push("Di");
      if (tati.status === "sick") who.push("Tati");
      couple = "👫 Casal: " + who.join(" e ") + (who.length > 1 ? " doentes 🤒" : " doente 🤒");
    } else {
      var cd = daysBetween(Math.max(di.streakStart, tati.streakStart), now);
      couple = "👫 Casal: " + cd + " " + dias(cd) + " sem ninguém doente (recorde " + (state.coupleBest || 0) + ")";
    }
    return "🩺 Dias sem Doença — " + fmtDate(now) + "\n" + couple + "\n" + personLine(di, now) + "\n" + personLine(tati, now);
  }
  var shareModal = document.getElementById("shareModal");
  document.getElementById("shareBtn").addEventListener("click", function () {
    var text = summaryText();
    if (navigator.share) {
      navigator.share({ title: "Dias sem Doença", text: text }).then(function () { closeModals(); })
        .catch(function () { openShareModal(text); });
    } else { openShareModal(text); }
  });
  function openShareModal(text) {
    menuModal.classList.add("hidden");
    document.getElementById("shareText").value = text;
    shareModal.classList.remove("hidden");
  }
  document.getElementById("shareCopy").addEventListener("click", function () {
    var ta = document.getElementById("shareText"), btn = this;
    function done() { btn.textContent = "Copiado ✓"; setTimeout(function () { btn.textContent = "Copiar"; }, 1500); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(ta.value).then(done).catch(function () { ta.focus(); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} });
    } else { ta.focus(); ta.select(); try { document.execCommand("copy"); done(); } catch (e) {} }
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "dias-sem-doenca-backup-" + tsToDateInput(Date.now()) + ".json";
    document.body.appendChild(a); a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 100);
  });

  var importFile = document.getElementById("importFile");
  document.getElementById("importBtn").addEventListener("click", function () { importFile.click(); });
  importFile.addEventListener("change", function () {
    var f = importFile.files && importFile.files[0]; if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var s = JSON.parse(reader.result);
        if (!valid(s)) throw new Error("formato");
        if (typeof s.coupleBest !== "number") s.coupleBest = 0;
        state = s; closeModals(); render(); commit();
        alert("Backup restaurado com sucesso! ✅");
      } catch (e) { alert("Não consegui ler esse arquivo. Escolha um backup válido (.json)."); }
      importFile.value = "";
    };
    reader.readAsText(f);
  });

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (confirm("Apagar todo o histórico e zerar todos os contadores?")) {
      state = defaultState(); closeModals(); render(); commit();
    }
  });

  Array.prototype.forEach.call(document.querySelectorAll("[data-close]"), function (b) { b.addEventListener("click", closeModals); });
  Array.prototype.forEach.call(document.querySelectorAll(".modal"), function (m) {
    m.addEventListener("click", function (e) { if (e.target === m) closeModals(); });
  });

  // ---------- relógio + volta pro app ----------
  render();
  setInterval(render, 30000);
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) return;
    render();
    fetch(SYNC_URL + "/_at.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (v) { if (typeof v === "number" && v > syncStamp + 1500) location.reload(); })
      .catch(function(){});
  });

  // ---------- service worker (offline) ----------
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }

  boot();
})();

  </script>
</body>
</html>
