<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2A2320" />
<title>Decora — planeje e orce a decoração</title>
<style>
  :root{
    --paper:#F1ECE4; --card:#FBF8F3; --ink:#26201B; --muted:#7A6E63; --line:#E2D9CC;
    --accent:#C57B4E; --accent-ink:#fff; --hero:#2A2320; --hero-ink:#F4EEE4;
    --ok:#3E8E5A; --warn:#C99A2E; --over:#C4553D;
    --chip:#EFE7DB; --shadow:0 8px 24px rgba(42,35,32,.10);
    --stage:#DED4C6; --gridline:rgba(0,0,0,.09);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#14110F; --card:#1D1815; --ink:#EEE7DD; --muted:#9C8E80; --line:#2E2620;
      --accent:#E09A64; --accent-ink:#1a120c; --hero:#0F0C0A; --hero-ink:#F4EEE4;
      --ok:#5BB37C; --warn:#E0B95A; --over:#E0765C;
      --chip:#251E19; --shadow:0 8px 24px rgba(0,0,0,.45);
      --stage:#2A231D; --gridline:rgba(255,255,255,.09);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{overflow-x:hidden}
  body{
    margin:0;background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }
  .wrap{max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 10px) 14px calc(92px + env(safe-area-inset-bottom))}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  a{color:var(--accent)}

  /* Header */
  header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  header .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(150deg,var(--accent),#9c5a34);
    display:grid;place-items:center;color:#fff;font-size:1.2rem;box-shadow:var(--shadow);flex:0 0 auto}
  header .htxt{min-width:0;flex:1}
  header .htxt .t{font-weight:800;font-size:1.12rem;line-height:1.1}
  header .htxt .s{color:var(--muted);font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Budget bar */
  .budget{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:12px}
  .budget .row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .budget .spent{font-weight:800;font-size:1.15rem}
  .budget .cap{color:var(--muted);font-size:.82rem}
  .budget .track{height:9px;border-radius:6px;background:var(--chip);margin-top:9px;overflow:hidden}
  .budget .fill{height:100%;border-radius:6px;background:var(--ok);transition:width .25s,background .25s;width:0}
  .budget.warn .fill{background:var(--warn)} .budget.over .fill{background:var(--over)}
  .budget .rest{font-size:.8rem;margin-top:6px;color:var(--muted)}
  .budget .rest b{color:var(--ink)}
  .budget.over .rest b{color:var(--over)}

  /* Stage / editor */
  .stage-tools{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .stage{position:relative;width:100%;aspect-ratio:4/3;background:var(--stage);border-radius:18px;overflow:hidden;
    border:1px solid var(--line);box-shadow:var(--shadow);touch-action:none;user-select:none}
  .stage .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stage .room{position:absolute;inset:0;background:
    linear-gradient(180deg,#00000000 58%, rgba(0,0,0,.06) 58%, rgba(0,0,0,.10) 100%)}
  .stage .hint{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:22px;
    color:var(--muted);font-size:.86rem;line-height:1.5;pointer-events:none}
  .sticker{position:absolute;touch-action:none;will-change:left,top,transform,width}
  .sticker .art{width:100%;filter:drop-shadow(0 4px 6px rgba(0,0,0,.28));touch-action:none}
  .sticker .art svg{display:block;width:100%;height:100%}
  .sticker.sel .art{outline:2px dashed var(--accent);outline-offset:4px;border-radius:6px}
  .handle{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--accent-ink);
    display:none;place-items:center;font-size:.85rem;box-shadow:0 2px 6px rgba(0,0,0,.35);touch-action:none;z-index:5}
  .sticker.sel .handle{display:grid}
  .h-rot{top:-34px;left:50%;transform:translateX(-50%)}
  .h-del{top:-13px;right:-13px;background:var(--over)}
  .h-scl{bottom:-13px;right:-13px}

  .selbar{display:none;margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:8px 10px;box-shadow:var(--shadow);align-items:center;gap:8px}
  .selbar.on{display:flex}
  .selbar .nm{flex:1;min-width:0;font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .selbar button{background:var(--chip);border-radius:9px;padding:7px 9px;font-size:.9rem}

  /* Buttons */
  .btn{background:var(--chip);border-radius:12px;padding:10px 12px;font-weight:700;font-size:.86rem;display:inline-flex;align-items:center;gap:6px}
  .btn.primary{background:var(--accent);color:var(--accent-ink)}
  .btn.block{display:flex;width:100%;justify-content:center}
  .btn:active{transform:scale(.98)}

  /* Section titles */
  .sec-t{font-weight:800;font-size:1rem;margin:18px 2px 10px}
  .note{font-size:.76rem;color:var(--muted);background:var(--chip);border-radius:10px;padding:8px 10px;line-height:1.4;margin-bottom:12px}

  /* Segmented toggle (Foto / Planta) */
  .seg{display:flex;gap:5px;background:var(--chip);border-radius:12px;padding:4px;margin-bottom:12px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-weight:800;font-size:.86rem;color:var(--muted)}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

  /* Planta (vista de cima, à escala) */
  .stage.planta{background:var(--stage);display:block}
  .floor{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);
    border:2px solid var(--muted);border-radius:4px;touch-action:none;box-shadow:inset 0 0 0 1px var(--line)}
  .footprint{position:absolute;transform:translate(-50%,-50%);background:rgba(197,123,78,.88);
    border:1.5px solid rgba(255,255,255,.9);border-radius:4px;display:grid;place-items:center;overflow:hidden;
    touch-action:none;color:#fff;box-shadow:0 2px 5px rgba(0,0,0,.25)}
  .footprint.sel{outline:2px dashed var(--ink);outline-offset:2px;z-index:6}
  .footprint.out{background:rgba(196,85,61,.92);border-color:#fff}
  .footprint .fpn{font-size:.58rem;font-weight:700;padding:0 3px;text-align:center;line-height:1.05;
    max-height:100%;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.45)}
  .dim{position:absolute;font-size:.64rem;font-weight:800;color:var(--muted);background:var(--card);
    padding:0 4px;border-radius:5px;opacity:.9}
  .dim-w{top:3px;left:50%;transform:translateX(-50%)}
  .dim-l{left:3px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl}

  /* Filters */
  .filters{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:.8rem;font-weight:600;white-space:nowrap}
  .chip.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  select,input[type=text],input[type=number]{
    width:100%;font-family:inherit;font-size:.92rem;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:11px 12px}

  /* Catalog grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .pcard .thumb{position:relative;background:var(--chip);border-radius:11px;aspect-ratio:4/3;display:grid;place-items:center;overflow:hidden;margin-bottom:8px}
  .pcard .thumb svg{width:74%;height:74%}
  .pcard .thumb img{width:100%;height:100%;object-fit:contain}
  .pcard .thumb .badge{position:absolute;top:5px;left:5px;background:var(--accent);color:var(--accent-ink);font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:999px}
  .pcard .pmeta .edit{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:underline}
  .imgprev{width:100%;aspect-ratio:4/3;background:var(--chip);border-radius:12px;display:grid;place-items:center;overflow:hidden;margin-top:6px}
  .imgprev img{width:100%;height:100%;object-fit:contain}
  .imgprev .ph{color:var(--muted);font-size:.8rem}
  .two{display:flex;gap:10px}.two .field{flex:1}
  .pcard .pn{font-weight:700;font-size:.82rem;line-height:1.2}
  .pcard .pp{font-weight:800;font-size:.86rem;margin-top:3px}
  .pcard .pmeta{color:var(--muted);font-size:.72rem;margin-top:2px}
  .pcard .pacts{display:flex;gap:6px;margin-top:9px}
  .pcard .pacts .btn{flex:1;justify-content:center;padding:8px 6px;font-size:.76rem}

  /* Lists (budget / projects) */
  .list{display:flex;flex-direction:column;gap:10px}
  .litem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px}
  .litem .ico{width:44px;height:44px;border-radius:11px;background:var(--chip);display:grid;place-items:center;flex:0 0 auto}
  .litem .ico svg{width:78%;height:78%}
  .litem .li-b{flex:1;min-width:0}
  .litem .li-n{font-weight:700;font-size:.86rem;line-height:1.2}
  .litem .li-s{color:var(--muted);font-size:.75rem;margin-top:2px}
  .litem .li-p{font-weight:800;font-size:.85rem;text-align:right;white-space:nowrap}
  .qtybtn{width:26px;height:26px;border-radius:8px;background:var(--chip);font-weight:800;display:grid;place-items:center}
  .catbar{margin:2px 0 4px}
  .catbar .cb-top{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px}
  .catbar .cb-top b{font-weight:700}
  .catbar .track{height:7px;border-radius:5px;background:var(--chip);overflow:hidden}
  .catbar .fill{height:100%;background:var(--accent);border-radius:5px}

  .empty{text-align:center;color:var(--muted);font-size:.86rem;line-height:1.5;padding:30px 16px}

  /* Bottom nav */
  nav.tab{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;
    background:var(--card);border-top:1px solid var(--line);display:flex;
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50}
  nav.tab button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:.66rem;font-weight:700;border-radius:12px}
  nav.tab button .ic{font-size:1.25rem;line-height:1}
  nav.tab button.on{color:var(--accent)}

  /* Toast + modal */
  .toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:999px;font-size:.82rem;font-weight:700;
    opacity:0;pointer-events:none;transition:.25s;z-index:100;box-shadow:var(--shadow)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:0}
  .modal.on{display:flex}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
  .sheet h3{font-size:1.05rem;margin-bottom:12px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:5px}
  .sheet-acts{display:flex;gap:8px;margin-top:6px}
  .sheet-acts .btn{flex:1;justify-content:center}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🛋️</div>
    <div class="htxt">
      <div class="t">Decora</div>
      <div class="s" id="hsub">—</div>
    </div>
    <button class="btn" id="projPick">Projetos ▾</button>
  </header>

  <div id="view"></div>
</div>

<nav class="tab" id="nav"></nav>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<input type="file" id="fileInput" accept="image/*" class="hidden" />
<input type="file" id="prodImgInput" accept="image/*" class="hidden" />

<script>
"use strict";

/* ============ Sincronização — Receita 1 (RTDB via REST, nó fixo) ============ */
const SYNC_URL = "https://apps-4b887-default-rtdb.firebaseio.com/planos/decoracao-dt2026";
let syncStamp = 0;

async function loadKey(key, fallback){
  try{
    const r = await fetch(`${SYNC_URL}/${key}.json`, { cache:"no-store" });
    if(r.ok){ const v = await r.json();
      if(v != null){ try{localStorage.setItem(key, v);}catch(e){} return JSON.parse(v); } }
  }catch(e){}
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch{ return fallback; }
}
async function saveKey(key, value){
  const s = JSON.stringify(value);
  try{ localStorage.setItem(key, s); }catch(e){}
  try{
    await fetch(`${SYNC_URL}/${key}.json`, { method:"PUT", body: JSON.stringify(s) });
    syncStamp = Date.now();
    fetch(`${SYNC_URL}/_at.json`, { method:"PUT", body: JSON.stringify(syncStamp) }).catch(()=>{});
  }catch(e){}
}
fetch(`${SYNC_URL}/_at.json`, { cache:"no-store" }).then(r=>r.json())
  .then(v=>{ if(typeof v === "number") syncStamp = v; }).catch(()=>{});
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) return;
  fetch(`${SYNC_URL}/_at.json`, { cache:"no-store" }).then(r=>r.json())
    .then(v=>{ if(typeof v === "number" && v > syncStamp + 1500) location.reload(); })
    .catch(()=>{});
});

/* ============================ Utilidades ============================ */
const $ = s => document.querySelector(s);
const el = (h)=>{ const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstElementChild; };
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = ()=> Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
const nf = new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});
const brl = n => 'R$ ' + nf.format(Math.round(n||0));
const brlRange = it => 'R$ ' + nf.format(it.min) + '–' + nf.format(it.max);
const midOf = it => (it.min + it.max)/2;

let toastT;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'), 1900);
}

/* ============================ Ícones (silhuetas) ============================ */
/* Cada ícone: viewBox próprio (aspecto natural) + markup. Cores fixas para lerem sobre foto. */
const ICONS = {
  sofa:{w:100,h:58,svg:'<rect x="4" y="22" width="92" height="28" rx="7" fill="#C98A6B"/><rect x="1" y="15" width="18" height="36" rx="7" fill="#B57A5B"/><rect x="81" y="15" width="18" height="36" rx="7" fill="#B57A5B"/><rect x="14" y="12" width="72" height="17" rx="7" fill="#D6a081"/><rect x="9" y="50" width="9" height="7" rx="2" fill="#6f4632"/><rect x="82" y="50" width="9" height="7" rx="2" fill="#6f4632"/>'},
  poltrona:{w:62,h:66,svg:'<rect x="9" y="26" width="44" height="28" rx="7" fill="#6B8FB5"/><rect x="3" y="18" width="15" height="38" rx="7" fill="#5B7EA3"/><rect x="44" y="18" width="15" height="38" rx="7" fill="#5B7EA3"/><rect x="15" y="12" width="32" height="20" rx="8" fill="#7FA3C6"/><rect x="12" y="54" width="8" height="8" rx="2" fill="#3f5468"/><rect x="42" y="54" width="8" height="8" rx="2" fill="#3f5468"/>'},
  mesaCentro:{w:96,h:44,svg:'<rect x="5" y="9" width="86" height="13" rx="4" fill="#B98A4E"/><rect x="9" y="15" width="86" height="4" fill="#00000022"/><rect x="14" y="22" width="7" height="18" rx="2" fill="#8f6a38"/><rect x="75" y="22" width="7" height="18" rx="2" fill="#8f6a38"/>'},
  rack:{w:100,h:40,svg:'<rect x="4" y="6" width="92" height="26" rx="5" fill="#A9773B"/><line x1="50" y1="8" x2="50" y2="30" stroke="#00000033" stroke-width="2"/><circle cx="42" cy="19" r="2.2" fill="#5c3f1e"/><circle cx="58" cy="19" r="2.2" fill="#5c3f1e"/><rect x="12" y="32" width="6" height="6" fill="#5c3f1e"/><rect x="82" y="32" width="6" height="6" fill="#5c3f1e"/>'},
  comoda:{w:70,h:66,svg:'<rect x="7" y="6" width="56" height="54" rx="5" fill="#B98A4E"/><line x1="9" y1="24" x2="61" y2="24" stroke="#00000033" stroke-width="2"/><line x1="9" y1="42" x2="61" y2="42" stroke="#00000033" stroke-width="2"/><circle cx="35" cy="15" r="2.4" fill="#5c3f1e"/><circle cx="35" cy="33" r="2.4" fill="#5c3f1e"/><circle cx="35" cy="51" r="2.4" fill="#5c3f1e"/><rect x="11" y="60" width="6" height="6" fill="#5c3f1e"/><rect x="53" y="60" width="6" height="6" fill="#5c3f1e"/>'},
  estante:{w:66,h:100,svg:'<rect x="9" y="4" width="48" height="92" rx="4" fill="#B98A4E"/><rect x="13" y="8" width="40" height="84" fill="#00000018"/><line x1="13" y1="34" x2="53" y2="34" stroke="#7a5a2e" stroke-width="3"/><line x1="13" y1="63" x2="53" y2="63" stroke="#7a5a2e" stroke-width="3"/><rect x="17" y="14" width="5" height="16" fill="#C4553D"/><rect x="24" y="16" width="5" height="14" fill="#3E8E5A"/><rect x="40" y="42" width="10" height="17" fill="#C99A2E"/>'},
  cama:{w:100,h:48,svg:'<rect x="4" y="8" width="14" height="38" rx="3" fill="#8f6a38"/><rect x="10" y="24" width="86" height="18" rx="4" fill="#A9773B"/><rect x="14" y="15" width="80" height="13" rx="6" fill="#E7DECE"/><rect x="20" y="10" width="26" height="12" rx="4" fill="#fff"/><rect x="12" y="42" width="7" height="6" fill="#5c3f1e"/><rect x="87" y="42" width="7" height="6" fill="#5c3f1e"/>'},
  armario:{w:78,h:100,svg:'<rect x="9" y="4" width="60" height="92" rx="4" fill="#B98A4E"/><line x1="39" y1="6" x2="39" y2="94" stroke="#00000030" stroke-width="2.5"/><rect x="33" y="40" width="3" height="16" rx="1.5" fill="#5c3f1e"/><rect x="42" y="40" width="3" height="16" rx="1.5" fill="#5c3f1e"/><rect x="12" y="96" width="7" height="4" fill="#5c3f1e"/><rect x="59" y="96" width="7" height="4" fill="#5c3f1e"/>'},
  criado:{w:52,h:56,svg:'<rect x="7" y="8" width="38" height="38" rx="5" fill="#B98A4E"/><line x1="9" y1="26" x2="43" y2="26" stroke="#00000030" stroke-width="2"/><circle cx="26" cy="17" r="2.2" fill="#5c3f1e"/><circle cx="26" cy="35" r="2.2" fill="#5c3f1e"/><rect x="10" y="46" width="6" height="9" fill="#5c3f1e"/><rect x="36" y="46" width="6" height="9" fill="#5c3f1e"/>'},

/* ============================ Estado ============================ */
let state = null;
function defaultState(){
  const pid = uid();
  return { v:1, currentId:pid, custom:[],
    ui:{ tab:"montar", view:"foto", cat:"", estilo:"", maxPreco:0 },
    projects:[ { id:pid, name:"Minha Sala", room:"sala", budget:8000, bg:null, roomW:4, roomL:3.5, items:[] } ] };
}
function curProj(){ return state.projects.find(p=>p.id===state.currentId) || state.projects[0]; }
function sceneSpent(p){ return p.items.reduce((s,i)=> s + midOf(def(i.catId)||{min:0,max:0}), 0); }
function allCatalog(){ return [...CAT, ...((state && state.custom) || [])]; }

let saveT;
function saveState(){ clearTimeout(saveT); saveT=setTimeout(()=>saveKey("state", state), 500); }

/* ============================ Render principal ============================ */
let selId = null;

function render(){
  const p = curProj();
  $('#hsub').textContent = `${esc(p.name)} · ${ROOMS[p.room].label}`;
  renderNav();
  const v = $('#view'); v.innerHTML = "";
  const tab = state.ui.tab;
  if(tab==="montar") renderMontar(v);
  else if(tab==="catalogo") renderCatalogo(v);
  else if(tab==="orcamento") renderOrcamento(v);
  else if(tab==="projetos") renderProjetos(v);
}

function renderNav(){
  const tabs = [["montar","🛋️","Montar"],["catalogo","🛒","Catálogo"],["orcamento","💰","Orçamento"],["projetos","🗂️","Projetos"]];
  const nav = $('#nav'); nav.innerHTML="";
  tabs.forEach(([k,ic,lb])=>{
    const b = el(`<button class="${state.ui.tab===k?'on':''}"><span class="ic">${ic}</span><span>${lb}</span></button>`);
    b.onclick = ()=>{ state.ui.tab=k; selId=null; render(); };
    nav.appendChild(b);
  });
}

function budgetBarHTML(p){
  const spent = sceneSpent(p), cap = p.budget||0;
  const pct = cap>0 ? clamp(spent/cap*100,0,100) : 0;
  const cls = cap>0 && spent>cap ? "over" : (cap>0 && spent>cap*0.85 ? "warn" : "");
  const rest = cap - spent;
  const restTxt = cap<=0 ? "Defina um orçamento na aba 💰" :
    (rest>=0 ? `Sobram <b>${brl(rest)}</b> do orçamento` : `<b>${brl(-rest)}</b> acima do orçamento`);
  return `<div class="budget ${cls}">
    <div class="row"><span class="spent">${brl(spent)}</span><span class="cap">de ${cap>0?brl(cap):'—'}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    <div class="rest">${restTxt}</div></div>`;
}

/* ============================ Aba: Montar (editor) ============================ */
function renderMontar(v){
  const p = curProj();
  v.appendChild(el(budgetBarHTML(p)));

  // alternador de visão: Foto (colagem) x Planta (vista de cima, cabe/não cabe)
  const seg = el(`<div class="seg">
    <button data-view="foto" class="${state.ui.view==='foto'?'on':''}">📷 Foto</button>
    <button data-view="planta" class="${state.ui.view==='planta'?'on':''}">📐 Planta</button>
  </div>`);
  v.appendChild(seg);
  seg.querySelectorAll('[data-view]').forEach(b=> b.onclick=()=>{ state.ui.view=b.dataset.view; selId=null; saveState(); render(); });

  if(state.ui.view==='planta') return renderPlanta(v, p);
  renderFotoEditor(v, p);
}

function renderFotoEditor(v, p){
  const tools = el(`<div class="stage-tools">
    <button class="btn" id="btPhoto">📷 ${p.bg?'Trocar foto':'Foto do ambiente'}</button>
    ${p.bg?'<button class="btn" id="btNoPhoto">🗑️ Remover foto</button>':''}
    <button class="btn primary" id="btAdd">＋ Móveis</button>
  </div>`);
  v.appendChild(tools);
  $('#btPhoto').onclick = ()=> pickPhoto();
  if($('#btNoPhoto')) $('#btNoPhoto').onclick = ()=>{ p.bg=null; saveState(); render(); };
  $('#btAdd').onclick = ()=>{ state.ui.tab="catalogo"; render(); };

  const stage = el(`<div class="stage" id="stage">
    ${p.bg? `<img class="bg" src="${p.bg}" alt="ambiente">` : '<div class="room"></div>'}
    ${p.items.length===0 && !p.bg ? '<div class="hint">Toque em <b>📷 Foto do ambiente</b> para subir a foto ou planta do lugar,<br>ou em <b>＋ Móveis</b> para começar a montar a decoração.</div>':''}
    ${p.items.length===0 && p.bg ? '<div class="hint">Agora toque em <b>＋ Móveis</b> e arraste as peças sobre a foto.</div>':''}
  </div>`);
  v.appendChild(stage);

  // barra de item selecionado
  const selbar = el(`<div class="selbar" id="selbar">
    <span class="nm" id="selName"></span>
    <button id="selBack" title="Enviar para trás">⬇︎</button>
    <button id="selFront" title="Trazer para frente">⬆︎</button>
    <button id="selDup" title="Duplicar">⧉</button>
  </div>`);
  v.appendChild(selbar);
  $('#selBack').onclick = ()=> zChange(-1);
  $('#selFront').onclick = ()=> zChange(1);
  $('#selDup').onclick = ()=> dupSel();

  // desenhar peças
  p.items.slice().sort((a,b)=>a.z-b.z).forEach(it=> stage.appendChild(makeSticker(it)));
  stage.addEventListener('pointerdown', (e)=>{ if(e.target===stage || e.target.classList.contains('bg') || e.target.classList.contains('room')){ selectItem(null); } });
  updateSelbar();
}

/* ---------- Planta 2D (vista de cima, à escala real) ---------- */
const fmtM = n => (Math.round((n||0)*10)/10).toString().replace('.', ',');

function renderPlanta(v, p){
  const tools = el(`<div class="stage-tools">
    <button class="btn" id="btRoom">📐 Cômodo: ${fmtM(p.roomW)} × ${fmtM(p.roomL)} m</button>
    <button class="btn primary" id="btAddP">＋ Móveis</button>
  </div>`);
  v.appendChild(tools);
  $('#btRoom').onclick = ()=> openRoomSheet(p);
  $('#btAddP').onclick = ()=>{ state.ui.tab="catalogo"; render(); };

  if(autoPlacePlan(p)) saveState();

  const stage = el('<div class="stage planta" id="stage"></div>');
  v.appendChild(stage);
  const floor = el(`<div class="floor" id="floor"><span class="dim dim-w">${fmtM(p.roomW)} m</span><span class="dim dim-l">${fmtM(p.roomL)} m</span></div>`);
  stage.appendChild(floor);
  layoutFloor(stage, floor, p);
  floor.style.backgroundImage = 'linear-gradient(to right, var(--gridline) 1px, transparent 1px),linear-gradient(to bottom, var(--gridline) 1px, transparent 1px)';
  floor.style.backgroundSize = (100/p.roomW)+'% '+(100/p.roomL)+'%';

  if(p.items.length===0){
    floor.appendChild(el('<div class="hint" style="position:absolute;inset:0">Adicione móveis pelo <b>＋ Móveis</b> — eles aparecem aqui à escala real do cômodo.</div>'));
  }
  p.items.forEach(it=> floor.appendChild(makeFootprint(it, p)));
  stage.addEventListener('pointerdown', (e)=>{ if(e.target===stage || e.target===floor || e.target.classList.contains('dim') || e.target.classList.contains('hint')) selectItem(null); });

  const selbar = el(`<div class="selbar" id="selbar">
    <span class="nm" id="selName"></span>
    <button id="selRot90" title="Girar 90°">⟳ 90°</button>
    <button id="selDel" title="Remover">🗑️</button>
  </div>`);
  v.appendChild(selbar);
  $('#selRot90').onclick = ()=> rot90();
  $('#selDel').onclick = ()=>{ if(selId) removeItem(selId); };

  const u = planUsage(p);
  v.appendChild(el(`<div class="note" style="margin-top:10px">
    🧭 Vista de cima à escala — arraste as peças e use <b>⟳ 90°</b> para girar.
    Piso ocupado: <b>${u.pct}%</b> (${fmtM(u.area)} de ${fmtM(p.roomW*p.roomL)} m²).
    ${u.out>0 ? `<br><span style="color:var(--over)">⚠️ ${u.out} peça(s) passando das paredes — não cabe assim.</span>` : ''}
  </div>`));
  updateSelbar();
}

function layoutFloor(stage, floor, p){
  const r = stage.getBoundingClientRect();
  const sw=r.width, sh=r.height;
  if(!sw || !sh){ floor.style.width='92%'; floor.style.height='92%'; return; }
  const ra=p.roomW/p.roomL, sa=sw/sh;
  let fw, fh;
  if(ra>=sa){ fw=sw*0.94; fh=fw/ra; } else { fh=sh*0.94; fw=fh*ra; }
  floor.style.width=(fw/sw*100)+'%';
  floor.style.height=(fh/sh*100)+'%';
}
function footExtent(it, p){ // extensão (fração do cômodo) já considerando rotação 90°
  const c=def(it.catId); if(!c) return {w:0,h:0};
  const rot = (Math.round(((it.prot||0)%180)/90)%2)===1;
  const wM=(rot?depthOf(c):c.wcm)/100, hM=(rot?c.wcm:depthOf(c))/100;
  return { w: wM/p.roomW, h: hM/p.roomL };
}
function isOut(it, p){
  const e=footExtent(it,p); const cx=(it.px==null?0.5:it.px), cy=(it.py==null?0.5:it.py);
  return (cx-e.w/2 < -0.002) || (cx+e.w/2 > 1.002) || (cy-e.h/2 < -0.002) || (cy+e.h/2 > 1.002);
}
function makeFootprint(it, p){
  const c=def(it.catId); if(!c) return el('<div></div>');
  const e=footExtent(it,p);
  const f=el(`<div class="footprint ${isOut(it,p)?'out':''} ${it.id===selId?'sel':''}" data-id="${it.id}"
      style="left:${(it.px==null?0.5:it.px)*100}%;top:${(it.py==null?0.5:it.py)*100}%;width:${clamp(e.w*100,2,100)}%;height:${clamp(e.h*100,2,100)}%">
      <span class="fpn">${esc(c.name)}</span></div>`);
  f.addEventListener('pointerdown', ev=> startPlanDrag(ev, it, p));
  return f;
}
let pdrag=null;
function startPlanDrag(e, it, p){
  e.preventDefault(); e.stopPropagation();
  selectItem(it.id);
  const floor=$('#floor'); const r=floor.getBoundingClientRect();
  pdrag={ id:it.id, r, sx:e.clientX, sy:e.clientY, ox:(it.px==null?0.5:it.px), oy:(it.py==null?0.5:it.py) };
  window.addEventListener('pointermove', planMove);
  window.addEventListener('pointerup', planUp, {once:true});
}
function planMove(e){
  if(!pdrag) return; const p=curProj(); const it=p.items.find(x=>x.id===pdrag.id); if(!it) return;
  it.px=clamp(pdrag.ox+(e.clientX-pdrag.sx)/pdrag.r.width, 0, 1);
  it.py=clamp(pdrag.oy+(e.clientY-pdrag.sy)/pdrag.r.height, 0, 1);
  const f=document.querySelector(`.footprint[data-id="${pdrag.id}"]`);
  if(f){ f.style.left=(it.px*100)+'%'; f.style.top=(it.py*100)+'%'; f.classList.toggle('out', isOut(it,p)); }
}
function planUp(){ window.removeEventListener('pointermove', planMove); pdrag=null; saveState(); render(); }
function rot90(){ const it=curProj().items.find(x=>x.id===selId); if(!it) return; it.prot=(((it.prot||0)+90)%360); saveState(); render(); }
function autoPlacePlan(p){
  const need=p.items.filter(it=> it.px==null || it.py==null);
  if(!need.length) return false;
  const cols=Math.max(1, Math.ceil(Math.sqrt(p.items.length)));
  let i=p.items.filter(it=> it.px!=null).length;
  need.forEach(it=>{
    const col=i%cols, row=Math.floor(i/cols);
    it.px=clamp((col+0.5)/cols, 0.1, 0.9);
    it.py=clamp((row+0.5)/cols, 0.1, 0.9);
    if(it.prot==null) it.prot=0;
    i++;
  });
  return true;
}
function planUsage(p){
  let area=0, out=0;
  p.items.forEach(it=>{ const c=def(it.catId); if(!c) return; area+=(c.wcm/100)*(depthOf(c)/100); if(isOut(it,p)) out++; });
  return { area, pct:Math.round(area/Math.max(p.roomW*p.roomL,0.01)*100), out };
}
function openRoomSheet(p){
  openSheet(`<h3>Dimensões do cômodo</h3>
    <div class="two">
      <div class="field"><label>Largura (m)</label><input type="number" step="0.1" id="rW" value="${p.roomW}" /></div>
      <div class="field"><label>Comprimento (m)</label><input type="number" step="0.1" id="rL" value="${p.roomL}" /></div>
    </div>
    <div class="note">Meça as paredes do cômodo. Os móveis aparecem à escala real; se uma peça passar das paredes, ela fica vermelha (não cabe assim).</div>
    <div class="sheet-acts"><button class="btn primary" id="rSave">Salvar</button></div>`);
  $('#rSave').onclick = ()=>{ p.roomW=clamp(+$('#rW').value||4,1,40); p.roomL=clamp(+$('#rL').value||3.5,1,40); saveState(); closeSheet(); render(); };
}

function makeSticker(it){
  const c = def(it.catId); if(!c) return el('<div></div>');
  const s = el(`<div class="sticker" data-id="${it.id}">
      <div class="art">${artHTML(c)}</div>
      <button class="handle h-rot" title="Girar">⟳</button>
      <button class="handle h-del" title="Remover">✕</button>
      <button class="handle h-scl" title="Redimensionar">⇲</button>
    </div>`);
  applyStyle(s, it);
  s.querySelector('.art').addEventListener('pointerdown', e=> startDrag(e, it, 'move'));
  s.querySelector('.h-rot').addEventListener('pointerdown', e=> startDrag(e, it, 'rotate'));
  s.querySelector('.h-scl').addEventListener('pointerdown', e=> startDrag(e, it, 'scale'));
  s.querySelector('.h-del').addEventListener('pointerdown', e=>{ e.preventDefault(); e.stopPropagation(); removeItem(it.id); });
  if(it.id===selId) s.classList.add('sel');
  return s;
}
function applyStyle(s, it){
  const c = def(it.catId); if(!c) return;
  s.style.left = (it.cx*100)+'%';
  s.style.top = (it.cy*100)+'%';
  s.style.width = (it.wFrac*100)+'%';
  s.style.zIndex = it.z;
  s.style.transform = `translate(-50%,-50%) rotate(${it.rot}deg)`;
  s.querySelector('.art').style.aspectRatio = aspectOf(c);
}
function stickerEl(id){ return document.querySelector(`.sticker[data-id="${id}"]`); }

let drag=null;
function startDrag(e, it, mode){
  e.preventDefault(); e.stopPropagation();
  selectItem(it.id);
  const stage = $('#stage'); const rect = stage.getBoundingClientRect();
  const cxp = rect.left + it.cx*rect.width, cyp = rect.top + it.cy*rect.height;
  drag = { mode, id:it.id, rect, cxp, cyp, sx:e.clientX, sy:e.clientY,
    o:{cx:it.cx, cy:it.cy, wFrac:it.wFrac, rot:it.rot},
    d0:Math.hypot(e.clientX-cxp, e.clientY-cyp),
    a0:Math.atan2(e.clientY-cyp, e.clientX-cxp) };
  window.addEventListener('pointermove', dragMove);
  window.addEventListener('pointerup', dragUp, {once:true});
}
function dragMove(e){
  if(!drag) return;
  const it = curProj().items.find(x=>x.id===drag.id); if(!it) return;
  if(drag.mode==='move'){
    it.cx = clamp(drag.o.cx + (e.clientX-drag.sx)/drag.rect.width, 0, 1);
    it.cy = clamp(drag.o.cy + (e.clientY-drag.sy)/drag.rect.height, 0, 1);
  } else if(drag.mode==='scale'){
    const d = Math.hypot(e.clientX-drag.cxp, e.clientY-drag.cyp);
    it.wFrac = clamp(drag.o.wFrac * (d/(drag.d0||1)), 0.05, 1.6);
  } else if(drag.mode==='rotate'){
    const a = Math.atan2(e.clientY-drag.cyp, e.clientX-drag.cxp);
    let deg = drag.o.rot + (a-drag.a0)*180/Math.PI;
    const m = ((deg%90)+90)%90;
    if(m<6 || m>84) deg = Math.round(deg/90)*90;
    it.rot = deg;
  }
  const s = stickerEl(drag.id); if(s) applyStyle(s, it);
}
function dragUp(){
  window.removeEventListener('pointermove', dragMove);
  drag=null; saveState(); refreshBudget();
}

function selectItem(id){
  selId = id;
  document.querySelectorAll('.sticker,.footprint').forEach(s=> s.classList.toggle('sel', s.dataset.id===id));
  updateSelbar();
}
function updateSelbar(){
  const bar = $('#selbar'); if(!bar) return;
  const it = selId && curProj().items.find(x=>x.id===selId);
  if(!it){ bar.classList.remove('on'); return; }
  bar.classList.add('on');
  $('#selName').textContent = (def(it.catId)||{name:'Item'}).name;
}
function removeItem(id){
  const p = curProj(); p.items = p.items.filter(x=>x.id!==id);
  if(selId===id) selId=null;
  saveState(); render();
}
function zChange(dir){
  const p = curProj(); const it = p.items.find(x=>x.id===selId); if(!it) return;
  const zs = p.items.map(x=>x.z);
  it.z = dir>0 ? Math.max(...zs)+1 : Math.min(...zs)-1;
  const s = stickerEl(it.id); if(s) s.style.zIndex = it.z;
  saveState();
}
function dupSel(){
  const p = curProj(); const it = p.items.find(x=>x.id===selId); if(!it) return;
  const n = {...it, id:uid(), cx:clamp(it.cx+0.06,0,1), cy:clamp(it.cy+0.06,0,1), z:Math.max(...p.items.map(x=>x.z))+1};
  p.items.push(n); saveState(); render(); selectItem(n.id);
}
function refreshBudget(){
  const bar = document.querySelector('.budget'); if(!bar) return;
  const p = curProj(); const fresh = el(budgetBarHTML(p));
  bar.replaceWith(fresh);
}

function addToScene(catId, silent){
  const p = curProj(), c = def(catId); if(!c) return;
  const wFrac = clamp(c.wcm/450, 0.16, 0.72);
  const z = p.items.length ? Math.max(...p.items.map(i=>i.z))+1 : 1;
  const it = { id:uid(), catId, cx:0.5+(Math.random()*0.16-0.08), cy:0.56+(Math.random()*0.12-0.06), wFrac, rot:0, z };
  p.items.push(it); saveState();
  if(!silent){ state.ui.tab="montar"; render(); selectItem(it.id); toast(`${c.name} adicionado`); }
}

  v.appendChild(filters);
  filters.querySelectorAll('[data-cat]').forEach(b=> b.onclick=()=>{ f.cat=b.dataset.cat; saveState(); render(); });
  filters.querySelectorAll('[data-est]').forEach(b=> b.onclick=()=>{ f.estilo=b.dataset.est; saveState(); render(); });
  const sel=$('#fMax'); sel.value=String(f.maxPreco||0); sel.onchange=()=>{ f.maxPreco=+sel.value; saveState(); render(); };

  // produtos do usuário primeiro, depois o catálogo embutido

    card.querySelector('[data-add]').onclick = ()=> addToScene(c.id);
    const ed = card.querySelector('[data-edit]');
    if(ed) ed.onclick = ()=> openProdSheet(def(ed.dataset.edit));
    grid.appendChild(card);
  });

/* ============================ Aba: Orçamento ============================ */
function renderOrcamento(v){
  const p = curProj();
  v.appendChild(el(budgetBarHTML(p)));

  const set = el(`<div class="field">
    <label>Quanto você quer gastar neste ambiente?</label>
    <input type="number" id="bInput" inputmode="numeric" value="${p.budget||''}" placeholder="ex: 8000" />
  </div>`);
  v.appendChild(set);
  const bi = $('#bInput');
  bi.oninput = ()=>{ p.budget = Math.max(0, +bi.value||0); saveState(); refreshBudget(); };

  // por categoria
  const byCat = {};
  p.items.forEach(i=>{ const c=def(i.catId); if(!c) return; byCat[c.cat]=(byCat[c.cat]||0)+midOf(c); });
  const cats = Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]);
  if(cats.length){
    const spent = sceneSpent(p);
    v.appendChild(el('<div class="sec-t">Por categoria</div>'));
    const box = el('<div></div>');
    cats.forEach(cat=>{
      const val = byCat[cat], pct = spent>0? (val/spent*100):0;
      box.appendChild(el(`<div class="catbar">
        <div class="cb-top"><b>${esc(CAT_LABELS[cat]||cat)}</b><span>${brl(val)}</span></div>
        <div class="track"><div class="fill" style="width:${pct}%"></div></div></div>`));
    });
    v.appendChild(box);
  }

  // lista de compras (agrupada)
  v.appendChild(el('<div class="sec-t">Lista de compras</div>'));
  const groups = {};
  p.items.forEach(i=>{ groups[i.catId]=(groups[i.catId]||0)+1; });
  const gkeys = Object.keys(groups);
  if(gkeys.length===0){
    v.appendChild(el(`<div class="empty">Nada na lista ainda.<br>Adicione móveis pelo <b>🛒 Catálogo</b>.</div>`));
  } else {
    const list = el('<div class="list"></div>');
    gkeys.forEach(cid=>{
      const c = def(cid), qt = groups[cid]; if(!c) return;
      const li = el(`<div class="litem">
        <div class="ico">${artHTML(c)}</div>
        <div class="li-b">
          <div class="li-n">${esc(c.name)}</div>
          <div class="li-s">${esc(storeName(c))} · ${brlRange(c)} ${buyLink(c)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="qtybtn" data-dec="${cid}">–</button>
          <b>${qt}</b>
          <button class="qtybtn" data-inc="${cid}">+</button>
        </div>
      </div>`);
      li.querySelector('[data-inc]').onclick = ()=> addToScene(cid, true) || render();
      li.querySelector('[data-dec]').onclick = ()=> removeOne(cid);
      list.appendChild(li);
    });
    v.appendChild(list);
    const copy = el('<button class="btn block" style="margin-top:12px">📋 Copiar lista de compras</button>');
    copy.onclick = ()=> copyList(p);
    v.appendChild(copy);
  }

  // recomendações
  renderRecs(v, p);
}

function removeOne(cid){
  const p = curProj();
  const idx = p.items.map(i=>i.catId).lastIndexOf(cid);
  if(idx>=0){ const it=p.items[idx]; if(selId===it.id) selId=null; p.items.splice(idx,1); }
  saveState(); render();
}

function renderRecs(v, p){
  const present = new Set(p.items.map(i=>(def(i.catId)||{}).cat).filter(Boolean));
  const ess = ROOMS[p.room].ess;
  const missing = ess.filter(c=>!present.has(c));
  const remaining = (p.budget||0) - sceneSpent(p);

  // estilo dominante da cena (para priorizar sugestões coerentes)
  const styleCount={};
  p.items.forEach(i=> ((def(i.catId)||{}).styles||[]).forEach(s=> styleCount[s]=(styleCount[s]||0)+1));
  const domStyle = Object.keys(styleCount).sort((a,b)=>styleCount[b]-styleCount[a])[0];

  v.appendChild(el(`<div class="sec-t">Sugestões para a ${esc(ROOMS[p.room].label.toLowerCase())}</div>`));
  if(missing.length===0){
    v.appendChild(el(`<div class="note">✅ Você já tem uma peça de cada categoria essencial deste ambiente. Bom trabalho!</div>`));
    return;
  }
  const faltamTxt = missing.map(c=>esc(CAT_LABELS[c]||c)).join(', ');
  v.appendChild(el(`<div class="note">Ainda falta: <b>${faltamTxt}</b>.${p.budget>0? (remaining>=0? ` Você tem <b>${brl(remaining)}</b> para completar.` : ` Você já passou do orçamento em <b>${brl(-remaining)}</b>.`) : ''}</div>`));

  const grid = el('<div class="grid"></div>');
  missing.forEach(cat=>{
    let opts = allCatalog().filter(c=>c.cat===cat);
    // 1) cabe no restante  2) combina com estilo dominante  3) mais barato
    const fits = opts.filter(c=> p.budget<=0 || c.min<=Math.max(remaining,0));
    let pool = fits.length? fits : opts;
    if(domStyle){
      const styled = pool.filter(c=>(c.styles||[]).includes(domStyle));
      if(styled.length) pool = styled;
    }
    const pick = pool.sort((a,b)=>a.min-b.min)[0];
    if(!pick) return;
    const fitsBudget = p.budget<=0 || pick.min<=Math.max(remaining,0);
    const buscar = buyUrl(pick) ? `<a class="btn" href="${esc(buyUrl(pick))}" target="_blank" rel="noopener">Buscar ↗</a>` : '';
    const card = el(`<div class="pcard">
      <div class="thumb">${artHTML(pick)}</div>
      <div class="pn">${esc(pick.name)}</div>
      <div class="pp">${brlRange(pick)}</div>
      <div class="pmeta">${esc(CAT_LABELS[cat]||cat)}${fitsBudget?'':' · acima do que sobra'}</div>
      <div class="pacts">
        <button class="btn primary" data-add="${pick.id}">＋ Cena</button>
        ${buscar}
      </div>
    </div>`);
    card.querySelector('[data-add]').onclick = ()=> addToScene(pick.id);
    grid.appendChild(card);
  });
  v.appendChild(grid);
}

function copyList(p){
  const groups = {};
  p.items.forEach(i=>{ groups[i.catId]=(groups[i.catId]||0)+1; });
  let total=0;
  const lines = Object.keys(groups).map(cid=>{
    const c=def(cid), qt=groups[cid]; if(!c) return ''; total += midOf(c)*qt;
    return `• ${qt}× ${c.name} — ${brlRange(c)} (${storeName(c)})`;
  });
  const txt = `Decoração — ${p.name} (${ROOMS[p.room].label})\n` +
    lines.filter(Boolean).join('\n') +
    `\n\nTotal estimado: ${brl(total)}` + (p.budget>0?` / Orçamento: ${brl(p.budget)}`:'') +
    `\n(Preços aproximados — confira nas lojas)`;
  const done = ()=> toast('Lista copiada!');
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done, ()=>fallbackCopy(txt,done)); }
  else fallbackCopy(txt, done);
}
function fallbackCopy(txt, done){
  const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ toast('Não foi possível copiar'); }
  ta.remove();
}

function renderProjetos(v){
  v.appendChild(el(`<div class="note">Cada projeto é um ambiente com sua foto, seus móveis e seu orçamento. Crie um para cada cômodo.</div>`));
  const add = el('<button class="btn primary block" style="margin-bottom:12px">＋ Novo ambiente</button>');
  add.onclick = ()=> openProjectSheet(null);
  v.appendChild(add);

  const list = el('<div class="list"></div>');
  state.projects.forEach(p=>{
    const spent = sceneSpent(p);
    const cur = p.id===state.currentId;
    const li = el(`<div class="litem" style="${cur?'border-color:var(--accent)':''}">
      <div class="ico">${cur?'📍':'🏠'}</div>
      <div class="li-b">
        <div class="li-n">${esc(p.name)} ${cur?'· <span style="color:var(--accent)">atual</span>':''}</div>
        <div class="li-s">${ROOMS[p.room].label} · ${p.items.length} ${p.items.length===1?'peça':'peças'} · ${brl(spent)}${p.budget>0?' / '+brl(p.budget):''}</div>
      </div>
      <button class="qtybtn" data-edit="${p.id}" style="width:auto;padding:0 9px">⋯</button>
    </div>`);
    li.onclick = (e)=>{ if(e.target.dataset.edit) return; state.currentId=p.id; state.ui.tab="montar"; selId=null; saveState(); render(); };
    li.querySelector('[data-edit]').onclick = (e)=>{ e.stopPropagation(); openProjectSheet(p); };
    list.appendChild(li);
  });
  v.appendChild(list);
}

/* ============================ Modal / sheet ============================ */
function openSheet(html){ $('#sheet').innerHTML=html; $('#modal').classList.add('on'); }
function closeSheet(){ $('#modal').classList.remove('on'); }
$('#modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeSheet(); });

function roomOptions(sel){ return Object.keys(ROOMS).map(k=>`<option value="${k}" ${k===sel?'selected':''}>${esc(ROOMS[k].label)}</option>`).join(''); }

function openProjectSheet(p){
  const isNew = !p;
  openSheet(`<h3>${isNew?'Novo ambiente':'Editar ambiente'}</h3>
    <div class="field"><label>Nome</label><input type="text" id="pName" value="${esc(p?p.name:'')}" placeholder="ex: Sala do apê novo" /></div>
    <div class="field"><label>Tipo de ambiente</label><select id="pRoom">${roomOptions(p?p.room:'sala')}</select></div>
    <div class="field"><label>Orçamento (R$)</label><input type="number" id="pBudget" inputmode="numeric" value="${p?p.budget:''}" placeholder="ex: 8000" /></div>
    <div class="two">
      <div class="field"><label>Largura (m)</label><input type="number" step="0.1" id="pRW" value="${p?p.roomW:'4'}" placeholder="4" /></div>
      <div class="field"><label>Comprimento (m)</label><input type="number" step="0.1" id="pRL" value="${p?p.roomL:'3.5'}" placeholder="3.5" /></div>
    </div>
    <div class="sheet-acts">
      ${!isNew?'<button class="btn" id="pDel" style="background:var(--over);color:#fff">Excluir</button>':''}
      <button class="btn primary" id="pSave">${isNew?'Criar':'Salvar'}</button>
    </div>`);
  $('#pSave').onclick = ()=>{
    const name = ($('#pName').value||'').trim() || 'Ambiente';
    const room = $('#pRoom').value, budget = Math.max(0,+$('#pBudget').value||0);
    const roomW = clamp(+$('#pRW').value||4,1,40), roomL = clamp(+$('#pRL').value||3.5,1,40);
    if(isNew){ const np={id:uid(), name, room, budget, bg:null, roomW, roomL, items:[]}; state.projects.push(np); state.currentId=np.id; state.ui.tab="montar"; }
    else { p.name=name; p.room=room; p.budget=budget; p.roomW=roomW; p.roomL=roomL; }
    saveState(); closeSheet(); selId=null; render();
  };
  if($('#pDel')) $('#pDel').onclick = ()=>{
    if(state.projects.length<=1){ toast('Deixe ao menos um ambiente'); return; }
    if(!confirm(`Excluir "${p.name}"? Não dá para desfazer.`)) return;
    state.projects = state.projects.filter(x=>x.id!==p.id);
    if(state.currentId===p.id) state.currentId=state.projects[0].id;
    saveState(); closeSheet(); render();
  };
}

function openProjPicker(){
  const rows = state.projects.map(p=>`<button class="btn block" data-pid="${p.id}" style="justify-content:space-between;margin-bottom:8px;${p.id===state.currentId?'border:1px solid var(--accent)':''}">
    <span>${esc(p.name)} · ${ROOMS[p.room].label}</span><span>${p.id===state.currentId?'📍':'›'}</span></button>`).join('');
  openSheet(`<h3>Trocar ambiente</h3>${rows}
    <button class="btn primary block" id="newFromPick" style="margin-top:6px">＋ Novo ambiente</button>`);
  $('#sheet').querySelectorAll('[data-pid]').forEach(b=> b.onclick=()=>{ state.currentId=b.dataset.pid; state.ui.tab="montar"; selId=null; saveState(); closeSheet(); render(); });
  $('#newFromPick').onclick = ()=>{ closeSheet(); openProjectSheet(null); };
}
$('#projPick').onclick = openProjPicker;

/* ============================ Foto (upload + downscale) ============================ */
function pickPhoto(){ $('#fileInput').value=''; $('#fileInput').click(); }
$('#fileInput').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 1400; let {width:w, height:h} = img;
      if(w>max || h>max){ const r=Math.min(max/w, max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let data; try{ data = cv.toDataURL('image/jpeg', 0.82); }catch(err){ data = reader.result; }
      curProj().bg = data; saveState(); render(); toast('Foto adicionada');
    };
    img.onerror = ()=> toast('Não consegui abrir a imagem');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

/* ============================ Produto do usuário (loja real) ============================ */
let prodDraft = null; // imagem/estilos pendentes enquanto a sheet está aberta

function styleChipsHTML(sel){
  return Object.keys(STYLE_LABELS).map(k=>`<button type="button" class="chip ${sel.includes(k)?'on':''}" data-pstyle="${k}">${esc(STYLE_LABELS[k])}</button>`).join('');
}
function openProdSheet(prod){
  const isNew = !prod;
  prodDraft = { img: prod?(prod.img||null):null, imgW: prod?(prod.imgW||0):0, imgH: prod?(prod.imgH||0):0, styles: prod?[...(prod.styles||[])]:[] };
  const catOpts = Object.keys(CAT_LABELS).map(k=>`<option value="${k}" ${prod&&prod.cat===k?'selected':''}>${esc(CAT_LABELS[k])}</option>`).join('');
  openSheet(`<h3>${isNew?'Adicionar produto de uma loja':'Editar produto'}</h3>
    <div class="field"><label>Nome do produto</label><input type="text" id="qName" value="${esc(prod?prod.name:'')}" placeholder="ex: Sofá cinza 3 lugares" /></div>
    <div class="two">
      <div class="field"><label>Preço mín (R$)</label><input type="number" id="qMin" inputmode="numeric" value="${prod?prod.min:''}" placeholder="1200" /></div>
      <div class="field"><label>Preço máx (R$)</label><input type="number" id="qMax" inputmode="numeric" value="${prod&&prod.max!==prod.min?prod.max:''}" placeholder="opcional" /></div>
    </div>
    <div class="field"><label>Loja</label><input type="text" id="qStore" value="${esc(prod?(prod.storeName||''):'')}" placeholder="ex: Mobly, Amazon..." /></div>
    <div class="field"><label>Link do produto (opcional)</label><input type="text" id="qUrl" value="${esc(prod?(prod.url||''):'')}" placeholder="https://..." /></div>
    <div class="field"><label>Categoria</label><select id="qCat">${catOpts}</select></div>
    <div class="field"><label>Estilo (opcional)</label><div class="chips" id="qStyles">${styleChipsHTML(prodDraft.styles)}</div></div>
    <div class="two">
      <div class="field"><label>Largura (cm)</label><input type="number" id="qW" inputmode="numeric" value="${prod&&prod.wcm?prod.wcm:''}" placeholder="200" /></div>
      <div class="field"><label>Profund. (cm)</label><input type="number" id="qD" inputmode="numeric" value="${prod&&prod.dcm?prod.dcm:''}" placeholder="90" /></div>
      <div class="field"><label>Altura (cm)</label><input type="number" id="qH" inputmode="numeric" value="${prod&&prod.hcm?prod.hcm:''}" placeholder="85" /></div>
    </div>
    <div class="field"><label>Foto do produto (recomendado)</label>
      <button type="button" class="btn block" id="qPickImg">🖼️ Escolher foto</button>
      <div class="imgprev" id="qPrev">${prodDraft.img?`<img src="${prodDraft.img}">`:'<span class="ph">sem foto — vai usar uma silhueta</span>'}</div>
      <button type="button" class="btn block" id="qRemoveBg" style="margin-top:6px;${prodDraft.img?'':'display:none'}">✂️ Remover fundo (beta)</button>
      <div class="ph" style="font-size:.72rem;margin-top:4px">Dica: “Remover fundo” funciona melhor em foto de produto com fundo branco/liso.</div>
    </div>
    <div class="sheet-acts">
      ${!isNew?'<button class="btn" id="qDel" style="background:var(--over);color:#fff">Excluir</button>':''}
      <button class="btn primary" id="qSave">${isNew?'Adicionar':'Salvar'}</button>
    </div>`);
  $('#qStyles').querySelectorAll('[data-pstyle]').forEach(b=> b.onclick=()=>{
    const k=b.dataset.pstyle, i=prodDraft.styles.indexOf(k);
    if(i>=0) prodDraft.styles.splice(i,1); else prodDraft.styles.push(k);
    b.classList.toggle('on');
  });
  $('#qPickImg').onclick = ()=> pickProdImg();
  $('#qRemoveBg').onclick = ()=>{
    if(!prodDraft.img){ toast('Escolha uma foto primeiro'); return; }
    const btn=$('#qRemoveBg'); btn.textContent='… processando'; btn.disabled=true;
    removeBgFromDataURL(prodDraft.img, (out,w,h)=>{
      btn.disabled=false; btn.textContent='✂️ Remover fundo (beta)';
      if(!out){ toast('Não consegui processar'); return; }
      prodDraft.img=out; if(w) prodDraft.imgW=w; if(h) prodDraft.imgH=h;
      const prev=$('#qPrev'); if(prev) prev.innerHTML=`<img src="${out}">`;
      toast('Fundo removido');
    });
  };
  $('#qSave').onclick = ()=>{
    const name=($('#qName').value||'').trim();
    if(!name){ toast('Dê um nome ao produto'); return; }
    let mn=Math.max(0,+$('#qMin').value||0), mx=Math.max(0,+$('#qMax').value||0);
    if(!mx) mx=mn; if(mx<mn){ const t=mn; mn=mx; mx=t; }
    const cat=$('#qCat').value;
    const wcm=Math.max(0,+$('#qW').value||0), hcm=Math.max(0,+$('#qH').value||0), dcm=Math.max(0,+$('#qD').value||0);
    const rec = { custom:true, name, min:mn, max:mx,
      storeName:($('#qStore').value||'').trim(), url:($('#qUrl').value||'').trim(),
      cat, icon:CAT_ICON[cat]||'mesaCentro', styles:[...prodDraft.styles],
      wcm:wcm||100, hcm:hcm||100, dcm:dcm||0, img:prodDraft.img||null, imgW:prodDraft.imgW||0, imgH:prodDraft.imgH||0 };
    if(isNew){ rec.id=uid(); state.custom.push(rec); }
    else { Object.assign(prod, rec); }
    saveState(); closeSheet(); render();
    toast(isNew?'Produto adicionado ao catálogo':'Produto atualizado');
  };
  if($('#qDel')) $('#qDel').onclick = ()=>{
    if(!confirm(`Excluir "${prod.name}" do seu catálogo? As peças dele saem das cenas.`)) return;
    state.custom = state.custom.filter(x=>x.id!==prod.id);
    state.projects.forEach(pr=> pr.items = pr.items.filter(it=> it.catId!==prod.id));
    if(selId && !curProj().items.some(it=>it.id===selId)) selId=null;
    saveState(); closeSheet(); render();
  };
}
function pickProdImg(){ $('#prodImgInput').value=''; $('#prodImgInput').click(); }
$('#prodImgInput').addEventListener('change',(e)=>{
  const file=e.target.files && e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=700; let {width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let data; try{ data=cv.toDataURL('image/png'); }catch(err){ data=reader.result; }
      prodDraft.img=data; prodDraft.imgW=w; prodDraft.imgH=h;
      const prev=$('#qPrev'); if(prev) prev.innerHTML=`<img src="${data}">`;
      const rb=$('#qRemoveBg'); if(rb) rb.style.display='flex';
      toast('Foto carregada');
    };
    img.onerror=()=> toast('Não consegui abrir a imagem');
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
});

/* Remove o fundo conectado às bordas (flood fill por tolerância). Bom p/ foto de produto em fundo liso. */
function removeBgFromDataURL(dataURL, cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.naturalWidth, h=img.naturalHeight;
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0);
    let id; try{ id=ctx.getImageData(0,0,w,h); }catch(e){ cb(null); return; }
    const d=id.data;
    const corners=[[0,0],[w-1,0],[0,h-1],[w-1,h-1]];
    let br=0,bg=0,bb=0; corners.forEach(([x,y])=>{ const o=(y*w+x)*4; br+=d[o]; bg+=d[o+1]; bb+=d[o+2]; });
    br/=4; bg/=4; bb/=4;
    const TH=6000; // ~45 por canal
    const visited=new Uint8Array(w*h);
    const stack=[];
    for(let x=0;x<w;x++){ stack.push(x, (h-1)*w+x); }
    for(let y=0;y<h;y++){ stack.push(y*w, y*w+w-1); }
    while(stack.length){
      const idx=stack.pop();
      if(visited[idx]) continue; visited[idx]=1;
      const o=idx*4;
      const dr=d[o]-br, dg=d[o+1]-bg, db=d[o+2]-bb;
      if(dr*dr+dg*dg+db*db > TH) continue; // não é fundo → não propaga
      d[o+3]=0;
      const x=idx%w, y=(idx/w)|0;
      if(x>0 && !visited[idx-1]) stack.push(idx-1);
      if(x<w-1 && !visited[idx+1]) stack.push(idx+1);
      if(y>0 && !visited[idx-w]) stack.push(idx-w);
      if(y<h-1 && !visited[idx+w]) stack.push(idx+w);
    }
    ctx.putImageData(id,0,0);
    let out; try{ out=cv.toDataURL('image/png'); }catch(e){ out=dataURL; }
    cb(out, w, h);
  };
  img.onerror=()=> cb(null);
  img.src=dataURL;
}

/* ============================ Boot ============================ */
(async function boot(){
  state = await loadKey("state", null);
  if(!state || !state.projects || !state.projects.length) state = defaultState();
  if(!state.ui) state.ui = {tab:"montar", view:"foto", cat:"", estilo:"", maxPreco:0};
  if(!state.ui.view) state.ui.view = "foto";
  if(!Array.isArray(state.custom)) state.custom = [];
  state.projects.forEach(p=>{ if(!p.roomW) p.roomW=4; if(!p.roomL) p.roomL=3.5; });
  if(!ROOMS[curProj().room]) curProj().room="sala";
  render();
})();
</script>
