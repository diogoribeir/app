<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B0E14" />
<title>Perfil Gamer — Biblioteca de Jogos</title>
<style>
:root{
  --bg:#EEF1F6; --surface:#FFFFFF; --surface2:#E4E9F2; --ink:#141A26; --muted:#61697A; --line:#D8DEE9;
  --accent:#2E6FF2; --accent2:#7B4DF2; --accent-soft:rgba(46,111,242,.10);
  --mp:#C98A00; --mb:#0E9A48; --bo:#2563EB; --me:#525C6B; --ru:#DE5A0C; --mr:#CE2626;
  --mp-s:rgba(201,138,0,.18); --mb-s:rgba(14,154,72,.16); --bo-s:rgba(37,99,235,.15);
  --me-s:rgba(82,92,107,.17); --ru-s:rgba(222,90,12,.16); --mr-s:rgba(206,38,38,.15);
  --von:#FFFFFF;
  --shadow:0 4px 16px rgba(20,26,38,.07);
  --hero:linear-gradient(135deg,#182036 0%,#101624 60%,#131C30 100%);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0B0E14; --surface:#131824; --surface2:#1B2232; --ink:#EAEEF6; --muted:#8A94A8; --line:#232C40;
    --accent:#4D8DFF; --accent2:#9D7BFF; --accent-soft:rgba(77,141,255,.13);
    --mp:#F5C518; --mb:#2FD675; --bo:#5B9DFF; --me:#A6B2C6; --ru:#FF8A3D; --mr:#FF5C5C;
    --mp-s:rgba(245,197,24,.20); --mb-s:rgba(47,214,117,.18); --bo-s:rgba(91,157,255,.18);
    --me-s:rgba(166,178,198,.20); --ru-s:rgba(255,138,61,.18); --mr-s:rgba(255,92,92,.17);
    --von:#12161F;
    --shadow:0 4px 18px rgba(0,0,0,.4);
    --hero:linear-gradient(135deg,#1A2340 0%,#12182B 55%,#1B1530 100%);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  padding:env(safe-area-inset-top) 0 0;
}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:640px;margin:0 auto;padding:0 14px calc(96px + env(safe-area-inset-bottom))}

/* ---------- cabeçalho ---------- */
header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 2px 12px}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:19px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 12px var(--accent-soft)}
.brand h1{margin:0;font-size:1.06rem;font-weight:800;letter-spacing:.02em;line-height:1.1}
.brand small{display:block;font-weight:600;font-size:.64rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.synctag{font-size:.6rem;font-weight:800;padding:4px 10px;border-radius:999px;background:var(--mb-s);color:var(--mb);white-space:nowrap}
.synctag.off{background:var(--surface2);color:var(--muted)}

/* ---------- hero "jogando agora" ---------- */
.hero{background:var(--hero);color:#EAEEF6;border-radius:20px;padding:14px 16px;margin-bottom:12px;
  position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::after{content:"";position:absolute;right:-30px;top:-40px;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(77,141,255,.25),transparent 70%)}
.hero .tagline{font-size:.6rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#8FB4FF}
.hero .hname{font-size:1.12rem;font-weight:800;margin:3px 0 2px;line-height:1.25}
.hero .hmeta{font-size:.74rem;color:#AAB6CE}
.hero .hrow{display:flex;align-items:center;gap:12px}
.hero .hicon{font-size:1.6rem}
.hero .hbody{flex:1;min-width:0}
.hero .hgo{font-size:1.3rem;color:#8FB4FF;font-weight:800}

/* ---------- faixa de stats ---------- */
.strip{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:11px 4px;margin-bottom:14px;box-shadow:var(--shadow)}
.strip .cell{flex:1;text-align:center;border-right:1px solid var(--line)}
.strip .cell:last-child{border-right:0}
.strip .v{font-size:1.02rem;font-weight:800}
.strip .k{font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;font-weight:700}

/* ---------- busca / filtros ---------- */
.search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:14px;background:var(--surface);
  color:var(--ink);font:inherit;font-size:.95rem}
.search::placeholder{color:var(--muted)}
.search:focus-visible{outline:2px solid var(--accent);border-color:var(--accent)}
.fbar{display:flex;gap:8px;margin-top:10px}
.fbtn{flex:1;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font:inherit;
  font-size:.88rem;font-weight:800;padding:12px;border-radius:13px;cursor:pointer}
.fbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.fbar select{flex:1;padding:12px 10px;border:1.5px solid var(--line);border-radius:13px;background:var(--surface);
  color:var(--ink);font:inherit;font-size:.86rem;font-weight:600}
.achips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.achip{display:inline-flex;align-items:center;gap:6px;border:0;border-radius:999px;padding:7px 12px;cursor:pointer;
  font:inherit;font-size:.74rem;font-weight:800;background:var(--vs,var(--accent-soft));color:var(--vc,var(--accent))}
.achip .x{opacity:.7;font-weight:800}
.achip.clear{background:var(--surface2);color:var(--muted)}
.fgroup{margin-top:14px}
.fgroup .glabel{font-size:.62rem;color:var(--muted);font-weight:800;letter-spacing:.09em;text-transform:uppercase;margin:0 2px 8px}
.tchips{display:flex;flex-wrap:wrap;gap:8px}
.tchip{border:1.5px solid var(--line);background:var(--bg);color:var(--muted);font:inherit;font-size:.84rem;
  font-weight:700;padding:11px 15px;border-radius:12px;cursor:pointer}
.tchip.on{border-color:var(--vc,var(--accent));color:var(--vc,var(--accent));background:var(--vs,var(--accent-soft));font-weight:800}
.tchip:active{transform:scale(.97)}
.toolrow{display:flex;align-items:center;gap:8px;margin:8px 0 12px}
.toolrow select{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);
  color:var(--ink);font:inherit;font-size:.84rem;font-weight:600}
.count{flex:0 0 auto;font-size:.7rem;color:var(--muted);font-weight:700}
.addbtn{width:100%;border:0;border-radius:14px;padding:14px;font:inherit;font-size:.95rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;margin:0 0 12px;
  box-shadow:0 6px 16px var(--accent-soft)}
.addbtn:active{transform:scale(.99)}

/* ---------- card de jogo ---------- */
details.game{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  margin-bottom:8px;overflow:hidden;position:relative}
details.game::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--vc,var(--line))}
details.game summary{cursor:pointer;list-style:none;padding:12px 14px 12px 16px}
details.game summary::-webkit-details-marker{display:none}
details.game summary:active{background:var(--surface2)}
.grow{display:flex;align-items:center;gap:10px}
.gname{flex:1;min-width:0;font-weight:750;font-size:.94rem;line-height:1.3}
.vpill{flex:0 0 auto;font-size:.63rem;font-weight:800;letter-spacing:.04em;padding:5px 10px;border-radius:8px;
  background:var(--vc,var(--surface2));color:var(--von,var(--muted));white-space:nowrap}
.gmeta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;font-size:.7rem;color:var(--muted);font-weight:600}
.gmeta .hrs{color:var(--ink);font-weight:800}
.gbody{padding:2px 14px 13px 16px;border-top:1px solid var(--line)}
.gbody .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.stat{background:var(--surface2);border-radius:11px;padding:8px 11px;font-size:.66rem;color:var(--muted);font-weight:700}
.stat b{color:var(--ink);font-size:.84rem;display:block;font-weight:800}
.gnote{font-size:.78rem;color:var(--muted);margin-top:10px;line-height:1.55}
.gnote b{color:var(--ink)}
.internal{font-size:.6rem;color:var(--muted);opacity:.7;margin-top:9px;letter-spacing:.03em}
.cardbtns{display:flex;gap:8px;margin-top:12px}
.cbtn{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font:inherit;
  font-size:.78rem;font-weight:700;padding:10px;border-radius:11px;cursor:pointer}
.cbtn:active{transform:scale(.98)}
.cbtn.del{color:var(--mr)}

/* ---------- estatísticas ---------- */
h2{font-size:.78rem;margin:20px 4px 9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:13px 14px;margin-bottom:10px}
.bar{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar:last-child{margin-bottom:0}
.bar .lbl{flex:0 0 96px;font-size:.7rem;font-weight:800;text-align:right}
.bar .track{flex:1;height:22px;background:var(--surface2);border-radius:8px;overflow:hidden}
.bar .fill{height:100%;border-radius:8px;min-width:3px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:6px;font-size:.62rem;font-weight:800;color:var(--von,#fff)}
.bar .val{flex:0 0 40px;font-size:.7rem;color:var(--muted);font-weight:700}
.rowline{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem}
.rowline:last-child{border-bottom:0}
.rowline .pos{flex:0 0 22px;height:22px;border-radius:7px;background:var(--surface2);color:var(--muted);
  font-size:.66rem;font-weight:800;display:grid;place-items:center}
.rowline .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:650}
.rowline .hv{flex:0 0 auto;font-weight:800}
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gcell{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 12px;box-shadow:var(--shadow)}
.gcell .t{font-size:.76rem;font-weight:800;line-height:1.2}
.gcell .n{font-size:.62rem;color:var(--muted);margin-top:3px;font-weight:600;line-height:1.45}
.lead{color:var(--muted);font-size:.78rem;margin:0 2px 10px;line-height:1.5}

/* ---------- plano ---------- */
.pitem{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.pitem:last-child{border-bottom:0}
.pwhen{flex:0 0 58px;text-align:center;background:var(--accent-soft);color:var(--accent);border-radius:10px;
  font-size:.62rem;font-weight:800;padding:6px 2px;letter-spacing:.02em}
.pbody{flex:1;min-width:0}
.pbody .t{font-size:.86rem;font-weight:750}
.pbody .s{font-size:.68rem;color:var(--muted);margin-top:2px;font-weight:600;line-height:1.4}
.pest{flex:0 0 auto;font-size:.72rem;font-weight:800;color:var(--accent)}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;background:rgba(4,6,11,.65);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.modal.hidden{display:none}
.mbox{background:var(--surface);color:var(--ink);width:100%;max-width:640px;border-radius:22px 22px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}
.mbox h2{margin:0 0 4px;font-size:1rem;text-transform:none;letter-spacing:0;color:var(--ink)}
.mbox label{display:block;font-size:.68rem;color:var(--muted);font-weight:800;margin:12px 0 4px;letter-spacing:.05em;text-transform:uppercase}
.mbox input,.mbox select,.mbox textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;
  background:var(--bg);color:var(--ink);font:inherit;font-size:.95rem}
.mbox textarea{min-height:64px;resize:vertical}
.mbox input:focus-visible,.mbox select:focus-visible,.mbox textarea:focus-visible{outline:2px solid var(--accent);border-color:var(--accent)}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mrow4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mactions{display:flex;gap:10px;margin-top:18px}
.mactions .btn{flex:1;border:0;border-radius:13px;padding:14px;font:inherit;font-size:.92rem;font-weight:800;cursor:pointer}
.btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-ghost{background:var(--surface2);color:var(--ink)}
details.internal-fields{margin-top:12px;border:1px dashed var(--line);border-radius:12px;padding:9px 12px}
details.internal-fields summary{cursor:pointer;font-size:.72rem;color:var(--muted);font-weight:700}

/* ---------- nav inferior ---------- */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:2px;background:var(--surface);
  border-top:1px solid var(--line);padding:6px 8px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px rgba(0,0,0,.12)}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:0;background:none;
  color:var(--muted);font:inherit;font-size:10.5px;font-weight:700;padding:7px 2px;border-radius:13px;cursor:pointer}
.tabbar button .ic{font-size:17px;line-height:1}
.tabbar button.on{color:var(--accent);background:var(--accent-soft)}
@media (min-width:700px){.tabbar{left:50%;right:auto;transform:translateX(-50%);width:440px;border:1px solid var(--line);border-radius:18px;bottom:12px}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">🎮</div>
      <h1>Perfil Gamer<small>PS4 + PS5 · biblioteca</small></h1>
    </div>
    <span class="synctag off" id="syncTag">conectando…</span>
  </header>
  <main id="content"></main>
</div>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="mbox">
    <h2 id="mTitle">Registrar jogo</h2>
    <label for="fNome">Nome do jogo *</label>
    <input id="fNome" type="text" autocomplete="off" />
    <div class="mrow">
      <div><label for="fHoras">Horas totais</label><input id="fHoras" type="number" min="0" step="0.5" /></div>
      <div><label for="fEnc">Status</label>
        <select id="fEnc"><option value="#">🔄 Jogando</option><option value="S">✅ Zerado</option><option value="N">❌ Dropado</option></select></div>
    </div>
    <div class="mrow">
      <div><label for="fW">Walkthroughs</label><input id="fW" type="number" min="1" step="1" value="1" /></div>
      <div><label for="fV">Veredicto</label>
        <select id="fV"><option value="N/A">— ainda sem veredicto —</option>
          <option>Masterpiece</option><option>Muito Bom</option><option>Bom</option>
          <option>Mediano</option><option>Ruim</option><option>Muito Ruim</option></select></div>
    </div>
    <label for="fGenres">Gêneros (1º = principal, separados por vírgula)</label>
    <input id="fGenres" type="text" placeholder="Ex.: Action RPG, Souls-like" autocomplete="off" />
    <div id="fMotivoWrap"><label for="fMotivo">Motivo da desistência (se dropado)</label>
    <textarea id="fMotivo"></textarea></div>
    <label for="fObs">Observação</label>
    <textarea id="fObs"></textarea>
    <details class="internal-fields"><summary>análise interna (opcional) — H · G · D · FF</summary>
      <div class="mrow4">
        <div><label for="fH">História 1-4</label><input id="fH" type="number" min="1" max="4" /></div>
        <div><label for="fG">Gameplay 1-4</label><input id="fG" type="number" min="1" max="4" /></div>
        <div><label for="fD">Dific. 1-3</label><input id="fD" type="number" min="1" max="3" /></div>
        <div><label for="fFF">Fun 1-4</label><input id="fFF" type="number" min="1" max="4" /></div>
      </div>
    </details>
    <div class="mactions">
      <button type="button" class="btn btn-ghost" id="mCancel">Cancelar</button>
      <button type="button" class="btn btn-save" id="mSave">Salvar</button>
    </div>
  </div>
</div>

<div id="fmodal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="mbox">
    <h2>🎚 Filtros</h2>
    <p style="margin:4px 0 0;font-size:.74rem;color:var(--muted);line-height:1.5">Toque para ligar/desligar — pode escolher vários.</p>
    <div class="fgroup"><div class="glabel">Status</div><div class="tchips" id="fgStatus"></div></div>
    <div class="fgroup"><div class="glabel">Veredicto</div><div class="tchips" id="fgVer"></div></div>
    <div class="mactions">
      <button type="button" class="btn btn-ghost" id="fClear">Limpar</button>
      <button type="button" class="btn btn-save" id="fApply">Mostrar tudo</button>
    </div>
  </div>
</div>

<div id="pmodal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="mbox">
    <h2 id="pTitle">Jogo planejado</h2>
    <label for="pJogo">Nome do jogo *</label>
    <input id="pJogo" type="text" autocomplete="off" />
    <div class="mrow">
      <div><label for="pLanc">Lançamento / quando</label><input id="pLanc" type="text" placeholder="Ex.: 05/Ago" autocomplete="off" /></div>
      <div><label for="pEst">Estimativa (horas)</label><input id="pEst" type="number" min="0" step="1" /></div>
    </div>
    <label for="pStatus">Status</label>
    <input id="pStatus" type="text" placeholder="Ex.: Próximo, Setembro…" autocomplete="off" />
    <div class="mactions">
      <button type="button" class="btn btn-ghost" id="pCancel">Cancelar</button>
      <button type="button" class="btn btn-save" id="pSave">Salvar</button>
    </div>
  </div>
</div>

<nav class="tabbar" id="tabbar" aria-label="Abas"></nav>
<script src="dados.js"></script>
<script>
"use strict";
const ORD = ["Muito Ruim","Ruim","Mediano","Bom","Muito Bom","Masterpiece"];
const VC = {"Masterpiece":["var(--mp)","var(--mp-s)","🏆"],"Muito Bom":["var(--mb)","var(--mb-s)","▲"],
  "Bom":["var(--bo)","var(--bo-s)","●"],"Mediano":["var(--me)","var(--me-s)","–"],
  "Ruim":["var(--ru)","var(--ru-s)","▼"],"Muito Ruim":["var(--mr)","var(--mr-s)","✕"]};
const CUSTO = 90;
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ---------- nuvem (Firebase RTDB do casal, receita 1) ---------- */
const SYNC_URL = "https://apps-4b887-default-rtdb.firebaseio.com/planos/perfil-gamer-dt2026";
const LS_KEY = "perfil-gamer:jogos";
let J = window.JOGOS || [];
let cloudOK = false;
let syncStamp = 0;

function saveJogos(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(J)); } catch(e){}
  fetch(`${SYNC_URL}/jogos.json`, { method:"PUT", body: JSON.stringify(J) })
    .then(()=>{ cloudOK = true; syncStamp = Date.now();
      fetch(`${SYNC_URL}/_at.json`, { method:"PUT", body: JSON.stringify(syncStamp) }).catch(()=>{});
      render(); })
    .catch(()=>{ cloudOK = false; render(); });
}
/* ---------- plano 2026 (editável, sincronizado) ---------- */
const LS_PLANO = "perfil-gamer:plano";
let P = [];              // itens do plano [{jogo,lanc,est,status}]
let horasDisp = 200;     // total de horas disponíveis (editável)
const estH = s => { const m = String(s??"").match(/[\d.]+/); return m ? parseFloat(m[0]) : 0; };
function savePlano(){
  const payload = { itens: P, horasDisp };
  try { localStorage.setItem(LS_PLANO, JSON.stringify(payload)); } catch(e){}
  fetch(`${SYNC_URL}/plano2026.json`, { method:"PUT", body: JSON.stringify(payload) })
    .then(()=>{ cloudOK = true; syncStamp = Date.now();
      fetch(`${SYNC_URL}/_at.json`, { method:"PUT", body: JSON.stringify(syncStamp) }).catch(()=>{});
      render(); })
    .catch(()=>{ cloudOK = false; render(); });
}

async function boot(){
  try { const raw = localStorage.getItem(LS_KEY); if (raw) J = JSON.parse(raw); } catch(e){}
  try { const raw = localStorage.getItem(LS_PLANO); if (raw){ const p = JSON.parse(raw);
    if (p && Array.isArray(p.itens)) { P = p.itens; if (typeof p.horasDisp === "number") horasDisp = p.horasDisp; } } } catch(e){}
  try {
    const r = await fetch(`${SYNC_URL}/jogos.json`, { cache:"no-store" });
    if (r.ok) {
      const v = await r.json();
      if (Array.isArray(v) && v.length) { J = v; cloudOK = true; try{localStorage.setItem(LS_KEY, JSON.stringify(J));}catch(e){} }
      else { cloudOK = true; saveJogos(); }
    }
  } catch(e){ cloudOK = false; }
  // migração: veredicto antigo "Medíocre" → "Mediano"
  let migrou = false;
  J.forEach(g=>{ if (g.v === "Medíocre"){ g.v = "Mediano"; migrou = true; } });
  if (migrou){ try{localStorage.setItem(LS_KEY, JSON.stringify(J));}catch(e){} if (cloudOK) saveJogos(); }
  try {
    const r = await fetch(`${SYNC_URL}/plano2026.json`, { cache:"no-store" });
    if (r.ok) {
      const v = await r.json();
      if (v && Array.isArray(v.itens)) { P = v.itens; if (typeof v.horasDisp === "number") horasDisp = v.horasDisp; }
      else if (P.length === 0 && Array.isArray(window.PLANO)) { P = window.PLANO.slice(); savePlano(); }
    }
  } catch(e){}
  if (P.length === 0 && Array.isArray(window.PLANO)) P = window.PLANO.slice();
  try { const r = await fetch(`${SYNC_URL}/_at.json`, { cache:"no-store" });
    const v = await r.json(); if (typeof v === "number") syncStamp = v; } catch(e){}
  render();
}
document.addEventListener("visibilitychange", () => {
  if (document.hidden) return;
  fetch(`${SYNC_URL}/_at.json`, { cache:"no-store" }).then(r=>r.json())
    .then(v=>{ if (typeof v === "number" && v > syncStamp + 1500) location.reload(); }).catch(()=>{});
});

/* ---------- estado da UI ---------- */
const TABS = [["jogos","Jogos","🎮"],["stats","Estatísticas","📊"],["plano","Plano 2026","🗓"]];
let tab = "jogos";
const fStatus = new Set();   // multi: S, N, #
const fVer = new Set();      // multi: veredictos
let busca = "";
let ordem = "horas";
let statVer = "";        // filtro de veredicto no Top da aba Estatísticas
const STATUS_LABEL = {"S":"✅ Zerados","N":"❌ Dropados","#":"🔄 Jogando"};
function aplicarFiltros(lst){
  if (fStatus.size) lst = lst.filter(g=>fStatus.has(g.enc));
  if (fVer.size) lst = lst.filter(g=>fVer.has(g.v));
  return lst;
}

function statusTxt(e){ return e==="S"?"✅ zerado":(e==="N"?"❌ dropado":"🔄 jogando"); }
function vpill(v){
  const c = VC[v];
  return c ? `<span class="vpill" style="--vc:${c[0]};--vs:${c[1]}">${c[2]} ${esc(v)}</span>`
           : `<span class="vpill">sem veredicto</span>`;
}
function custoHora(g){ return g.horas>0 ? (CUSTO/g.horas) : null; }
function horasOcultas(g){ return /FINAL FANTASY XIV/i.test(g.nome||""); }
function fmtCH(c){ return c==null?"—":("R$ "+c.toFixed(2).replace(".",",")+"/h"); }

/* ---------- aba Jogos ---------- */
function gameCard(g){
  const ch = custoHora(g);
  const c = VC[g.v];
  const comp = [g.h!=null&&g.h!=="N/A"?`H ${g.h}`:null, g.g!=null&&g.g!=="N/A"?`G ${g.g}`:null,
                g.d!=null?`D ${g.d}`:null, g.ff!=null?`FF ${g.ff}`:null].filter(Boolean).join(" · ");
  return `<details class="game" style="--vc:${c?c[0]:"var(--line)"};--vs:${c?c[1]:"var(--surface2)"}">
    <summary>
      <div class="grow"><div class="gname">${esc(g.nome)}</div>${vpill(g.v)}</div>
      <div class="gmeta">
        ${horasOcultas(g)?"":`<span class="hrs num">⏱ ${g.horas}h</span>`}
        <span>${statusTxt(g.enc)}</span>
        <span>${esc((g.genres||"").split(",")[0].trim())}</span>
        ${g.w>=2?`<span>♥ ${g.w}×</span>`:""}
      </div>
    </summary>
    <div class="gbody">
      <div class="row">
        ${horasOcultas(g)?"":`<span class="stat"><b class="num">${fmtCH(ch)}</b>custo/hora</span>
        <span class="stat"><b class="num">${g.horas}h</b>tempo total</span>`}
        <span class="stat"><b>${esc(g.genres||"—")}</b>gêneros</span>
      </div>
      ${g.motivo?`<div class="gnote"><b>Motivo do drop:</b> ${esc(g.motivo)}</div>`:""}
      ${g.obs?`<div class="gnote"><b>Obs:</b> ${esc(g.obs)}</div>`:""}
      ${comp?`<div class="internal">análise interna · ${esc(comp)}</div>`:""}
      <div class="cardbtns">
        <button type="button" class="cbtn" data-editar="${g.id}">✏️ Editar</button>
        <button type="button" class="cbtn del" data-excluir="${g.id}">🗑 Excluir</button>
      </div>
    </div>
  </details>`;
}
function viewJogos(){
  let lst = J.slice();
  if (busca) { const b = busca.toLowerCase(); lst = lst.filter(g=>g.nome.toLowerCase().includes(b)||(g.genres||"").toLowerCase().includes(b)); }
  lst = aplicarFiltros(lst);
  const ords = {
    horas:(a,b)=>b.horas-a.horas,
    veredicto:(a,b)=>(ORD.indexOf(b.v)-ORD.indexOf(a.v))||(b.horas-a.horas),
    nome:(a,b)=>a.nome.localeCompare(b.nome,"pt"),
    custo:(a,b)=>{const ca=custoHora(a)??1e9, cb=custoHora(b)??1e9; return ca-cb;}
  };
  lst.sort(ords[ordem]||ords.horas);

  const tot=J.length;
  const comp=J.filter(g=>g.enc==="S").length, drop=J.filter(g=>g.enc==="N").length;
  const agora = J.filter(g=>g.enc==="#");
  const hero = agora.length ? `
    <div class="hero" data-editar-hero="${agora[0].id}">
      <div class="hrow">
        <span class="hicon">🕹️</span>
        <div class="hbody">
          <div class="tagline">Jogando agora</div>
          <div class="hname">${esc(agora[0].nome)}</div>
          <div class="hmeta num">${horasOcultas(agora[0])?"":`⏱ ${agora[0].horas}h · `}${agora[0].obs?`${esc(agora[0].obs.split("·")[0].trim())}`:""}${agora.length>1?` · +${agora.length-1} em progresso`:""}</div>
        </div>
        <span class="hgo">›</span>
      </div>
    </div>` : "";

  return `${hero}
  <div class="strip">
    <div class="cell"><div class="v num">${tot}</div><div class="k">jogos</div></div>
    <div class="cell"><div class="v num">${Math.round(comp/tot*100)}%</div><div class="k">zerados</div></div>
    <div class="cell"><div class="v num">${Math.round(drop/tot*100)}%</div><div class="k">drop</div></div>
  </div>
  <button type="button" class="addbtn" id="btnAdd">➕ Registrar jogo</button>
  <input class="search" id="busca" type="search" placeholder="Buscar jogo ou gênero…" value="${esc(busca)}" />
  <div class="fbar">
    <button type="button" class="fbtn ${(fStatus.size+fVer.size)?"on":""}" id="btnFiltro">🎚 Filtros${(fStatus.size+fVer.size)?` (${fStatus.size+fVer.size})`:""}</button>
    <select id="ordem" aria-label="Ordenar">
      <option value="horas" ${ordem==="horas"?"selected":""}>⏱ Mais horas</option>
      <option value="veredicto" ${ordem==="veredicto"?"selected":""}>🏆 Melhor veredicto</option>
      <option value="custo" ${ordem==="custo"?"selected":""}>💰 Melhor custo/hora</option>
      <option value="nome" ${ordem==="nome"?"selected":""}>🔤 Nome (A–Z)</option>
    </select>
  </div>
  ${(fStatus.size+fVer.size) ? `<div class="achips">
    ${[...fStatus].map(s=>`<button class="achip" data-unstatus="${esc(s)}">${STATUS_LABEL[s]} <span class="x">✕</span></button>`).join("")}
    ${[...fVer].map(v=>`<button class="achip" style="--vc:${VC[v]?VC[v][0]:"var(--accent)"};--vs:${VC[v]?VC[v][1]:"var(--accent-soft)"}" data-unver="${esc(v)}">${VC[v]?VC[v][2]+" ":""}${esc(v)} <span class="x">✕</span></button>`).join("")}
    ${(fStatus.size+fVer.size)>1?`<button class="achip clear" data-unall="1">limpar tudo</button>`:""}
  </div>`:""}
  <div class="toolrow"><span class="count num">${lst.length} jogo(s) na lista</span></div>
  ${lst.map(gameCard).join("") || '<p class="lead">Nenhum jogo com esse filtro.</p>'}`;
}

/* ---------- aba Estatísticas ---------- */
function viewStats(){
  const rated = J.filter(g=>ORD.includes(g.v));
  const dist = {}; ORD.forEach(v=>dist[v]=0); rated.forEach(g=>dist[g.v]++);
  const maxD = Math.max(...Object.values(dist),1);
  const bars = ORD.slice().reverse().map(v=>`
    <div class="bar"><div class="lbl" style="color:${VC[v][0]}">${VC[v][2]} ${v}</div>
      <div class="track"><div class="fill" style="width:${Math.max(dist[v]/maxD*100,6)}%;background:${VC[v][0]}">${dist[v]||""}</div></div>
      <div class="val num">${Math.round(dist[v]/(rated.length||1)*100)}%</div></div>`).join("");
  let topLst = J.slice().filter(g=>!horasOcultas(g));
  if (statVer) topLst = topLst.filter(g=>g.v===statVer);
  const topRows = topLst.sort((a,b)=>b.horas-a.horas).slice(0,10).map((g,i)=>
    `<div class="rowline"><span class="pos num">${i+1}</span>
      <span class="dot" style="background:${VC[g.v]?VC[g.v][0]:"var(--line)"}"></span>
      <span class="nm">${esc(g.nome)}</span><span class="hv num">${g.horas}h</span></div>`).join("")
    || '<p class="lead" style="margin:6px 2px">Nenhum jogo com esse veredicto.</p>';
  const topChips = `<div class="tchips" style="margin-bottom:11px">
    <button type="button" class="tchip ${statVer===""?"on":""}" data-statver="">Todos</button>
    ${ORD.slice().reverse().map(v=>`<button type="button" class="tchip ${statVer===v?"on":""}" style="--vc:${VC[v][0]};--vs:${VC[v][1]}" data-statver="${esc(v)}">${VC[v][2]} ${esc(v)}</button>`).join("")}
  </div>`;
  const gen = {};
  J.forEach(g=>{ const k=(g.genres||"?").split(",")[0].trim(); (gen[k]=gen[k]||[]).push(g); });
  const genRows = Object.entries(gen).sort((a,b)=>b[1].length-a[1].length).slice(0,10).map(([k,v])=>{
    const c=v.filter(x=>x.enc==="S").length, d=v.filter(x=>x.enc==="N").length, fin=Math.max(c+d,1);
    const hrs=v.reduce((s,x)=>s+(horasOcultas(x)?0:x.horas),0);
    return `<div class="gcell"><div class="t">${esc(k)}</div>
      <div class="n num">${v.length} jogos · ${Math.round(hrs).toLocaleString("pt-BR")}h<br>zera ${Math.round(c/fin*100)}% · dropa ${Math.round(d/fin*100)}%</div></div>`;
  }).join("");
  const drops = J.filter(g=>g.enc==="N").sort((a,b)=>b.horas-a.horas).map(gameCard).join("");
  return `
    <h2>⭐ Veredictos</h2><div class="card">${bars}</div>
    <h2>⏱ Top 10 — mais horas${statVer?` · ${statVer}`:""}</h2><div class="card">${topChips}${topRows}</div>
    <h2>🎯 Por gênero principal</h2><div class="ggrid">${genRows}</div>
    <h2>❌ Drops — toque para ver o motivo</h2>${drops}`;
}

/* ---------- aba Plano ---------- */
function viewPlano(){
  const somaEst = P.reduce((s,p)=>s+estH(p.est),0);
  const rest = horasDisp - somaEst;
  const cabe = rest >= 0;
  const cor = cabe ? "var(--mb)" : "var(--mr)";
  const pct = horasDisp>0 ? Math.min(somaEst/horasDisp*100,100) : 0;
  const rows = P.length ? P.map((p,i)=>`
    <div class="pitem">
      <span class="pwhen">${esc(p.lanc||"—")}</span>
      <div class="pbody"><div class="t">${esc(p.jogo)}</div>
        <div class="s num">estimativa ${estH(p.est)?estH(p.est)+"h":"—"}${p.status?` · ${esc(p.status)}`:""}</div></div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button type="button" class="cbtn" style="padding:6px 10px" data-peditar="${i}">✏️</button>
        <button type="button" class="cbtn del" style="padding:6px 10px" data-pexcluir="${i}">🗑</button>
      </div>
    </div>`).join("") : '<p class="lead" style="margin:6px 2px">Nenhum jogo planejado ainda.</p>';
  return `<p class="lead">Planeje a fila de 2026 e veja se as horas dos jogos cabem no seu tempo disponível.</p>
    <h2>⏳ Horas disponíveis</h2>
    <div class="card">
      <label style="display:block;font-size:.68rem;color:var(--muted);font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px">Total de horas que você tem</label>
      <input id="pHorasDisp" type="number" min="0" step="1" value="${horasDisp}"
        style="width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink);font:inherit;font-size:1rem;font-weight:800" />
      <div class="strip" style="margin:12px 0 0">
        <div class="cell"><div class="v num">${Math.round(somaEst)}h</div><div class="k">soma dos jogos</div></div>
        <div class="cell"><div class="v num">${horasDisp}h</div><div class="k">disponível</div></div>
        <div class="cell"><div class="v num" style="color:${cor}">${cabe?"":"−"}${Math.abs(Math.round(rest))}h</div><div class="k">${cabe?"sobra":"falta"}</div></div>
      </div>
      <div class="bar" style="margin-top:12px"><div class="track"><div class="fill" style="width:${Math.max(pct,3)}%;background:${cor}">${Math.round(pct)}%</div></div></div>
      <div class="lead" style="margin:8px 2px 0;color:${cor}">${cabe?`✓ Cabe no tempo — sobram ${Math.round(rest)}h.`:`⚠ Passou ${Math.abs(Math.round(rest))}h do disponível. Tire um jogo ou aumente as horas.`}</div>
    </div>
    <button type="button" class="addbtn" id="btnAddPlano">➕ Adicionar jogo planejado</button>
    <h2>🗓 Fila de jogos</h2><div class="card">${rows}</div>`;
}

/* ---------- render ---------- */
const VIEWS = {jogos:viewJogos, stats:viewStats, plano:viewPlano};
function render(){
  $("#tabbar").innerHTML = TABS.map(([id,l,ic])=>
    `<button type="button" data-tab="${id}" class="${id===tab?'on':''}"><span class="ic">${ic}</span><span>${l}</span></button>`).join("");
  $("#content").innerHTML = VIEWS[tab]();
  const st = $("#syncTag");
  st.textContent = cloudOK ? "sincronizado ✓" : "offline · salva no aparelho";
  st.className = "synctag" + (cloudOK ? "" : " off");
  const b = $("#busca"); if (b){ b.addEventListener("input", e=>{ busca=e.target.value;
    const pos = b.selectionStart; render(); const nb=$("#busca"); if(nb){ nb.focus(); nb.setSelectionRange(pos,pos); }
  }); }
  const o = $("#ordem"); if (o) o.addEventListener("change", e=>{ ordem=e.target.value; render(); });
  const hd = $("#pHorasDisp"); if (hd) hd.addEventListener("change", e=>{
    horasDisp = Math.max(0, Number(e.target.value)||0); savePlano(); });
}

/* ---------- registrar / editar / excluir ---------- */
let editId = null;
function openModal(g){
  editId = g ? g.id : null;
  $("#mTitle").textContent = g ? "Editar jogo" : "Registrar jogo";
  $("#fNome").value = g?.nome || "";
  $("#fHoras").value = g?.horas ?? "";
  $("#fEnc").value = g?.enc || "#";
  $("#fW").value = g?.w ?? 1;
  $("#fV").value = (g && ORD.includes(g.v)) ? g.v : "N/A";
  $("#fGenres").value = g?.genres || "";
  $("#fMotivo").value = g?.motivo || "";
  $("#fObs").value = g?.obs || "";
  const iv = (x)=> (x==null||x==="N/A") ? "" : x;
  $("#fH").value = iv(g?.h); $("#fG").value = iv(g?.g); $("#fD").value = iv(g?.d); $("#fFF").value = iv(g?.ff);
  $("#modal").classList.remove("hidden");
  setTimeout(()=>$("#fNome").focus(), 60);
}
function closeModal(){ $("#modal").classList.add("hidden"); editId = null; }
$("#mCancel").addEventListener("click", closeModal);
$("#modal").addEventListener("click", e=>{ if (e.target === $("#modal")) closeModal(); });
$("#mSave").addEventListener("click", ()=>{
  const nome = $("#fNome").value.trim();
  if (!nome){ $("#fNome").focus(); return; }
  const numOr = (id, def)=>{ const v = $(id).value; return v==="" ? def : Number(v); };
  const reg = {
    nome, horas: numOr("#fHoras", 0), enc: $("#fEnc").value, w: numOr("#fW", 1),
    motivo: $("#fMotivo").value.trim(), genres: $("#fGenres").value.trim(),
    h: numOr("#fH", null), g: numOr("#fG", null), d: numOr("#fD", null), ff: numOr("#fFF", null),
    v: $("#fV").value, obs: $("#fObs").value.trim()
  };
  if (editId != null){
    const i = J.findIndex(x=>x.id===editId);
    if (i>=0) J[i] = Object.assign({}, J[i], reg);
  } else {
    reg.id = J.reduce((m,x)=>Math.max(m, x.id||0), 0) + 1;
    J.push(reg);
  }
  closeModal(); saveJogos(); render();
});

/* ---------- painel de filtros ---------- */
function renderSheet(){
  $("#fgStatus").innerHTML = Object.entries(STATUS_LABEL).map(([s,l])=>
    `<button type="button" class="tchip ${fStatus.has(s)?"on":""}" data-tstatus="${esc(s)}">${l}</button>`).join("");
  $("#fgVer").innerHTML = ORD.slice().reverse().map(v=>
    `<button type="button" class="tchip ${fVer.has(v)?"on":""}" style="--vc:${VC[v][0]};--vs:${VC[v][1]}" data-tver="${esc(v)}">${VC[v][2]} ${esc(v)}</button>`).join("");
  const n = aplicarFiltros(J.slice()).length;
  $("#fApply").textContent = (fStatus.size+fVer.size) ? `Mostrar ${n} jogo(s)` : "Mostrar tudo";
}
function openSheet(){ renderSheet(); $("#fmodal").classList.remove("hidden"); }
function closeSheet(){ $("#fmodal").classList.add("hidden"); render(); }
$("#fApply").addEventListener("click", closeSheet);
$("#fClear").addEventListener("click", ()=>{ fStatus.clear(); fVer.clear(); renderSheet(); });
$("#fmodal").addEventListener("click", e=>{ if (e.target === $("#fmodal")) closeSheet(); });

/* ---------- modal do plano ---------- */
let pEditIdx = null;
function openPlano(idx){
  pEditIdx = (idx==null) ? null : idx;
  const p = (idx==null) ? null : P[idx];
  $("#pTitle").textContent = p ? "Editar jogo planejado" : "Adicionar jogo planejado";
  $("#pJogo").value = p?.jogo || "";
  $("#pLanc").value = p?.lanc || "";
  $("#pEst").value = p ? (estH(p.est)||"") : "";
  $("#pStatus").value = p?.status || "";
  $("#pmodal").classList.remove("hidden");
  setTimeout(()=>$("#pJogo").focus(), 60);
}
function closePlano(){ $("#pmodal").classList.add("hidden"); pEditIdx = null; }
$("#pCancel").addEventListener("click", closePlano);
$("#pmodal").addEventListener("click", e=>{ if (e.target === $("#pmodal")) closePlano(); });
$("#pSave").addEventListener("click", ()=>{
  const jogo = $("#pJogo").value.trim();
  if (!jogo){ $("#pJogo").focus(); return; }
  const h = $("#pEst").value;
  const reg = { jogo, lanc: $("#pLanc").value.trim(), est: h==="" ? "" : (Number(h)+"h"), status: $("#pStatus").value.trim() };
  if (pEditIdx!=null && P[pEditIdx]) P[pEditIdx] = reg; else P.push(reg);
  closePlano(); savePlano(); render();
});

document.addEventListener("click", e=>{
  const t = e.target.closest("[data-tab]"); if (t){ tab=t.dataset.tab; render(); window.scrollTo({top:0}); return; }
  if (e.target.closest("#btnFiltro")){ openSheet(); return; }
  const ts = e.target.closest("[data-tstatus]");
  if (ts){ const s=ts.dataset.tstatus; fStatus.has(s)?fStatus.delete(s):fStatus.add(s); renderSheet(); return; }
  const tv = e.target.closest("[data-tver]");
  if (tv){ const v=tv.dataset.tver; fVer.has(v)?fVer.delete(v):fVer.add(v); renderSheet(); return; }
  const us = e.target.closest("[data-unstatus]");
  if (us){ fStatus.delete(us.dataset.unstatus); render(); return; }
  const uv = e.target.closest("[data-unver]");
  if (uv){ fVer.delete(uv.dataset.unver); render(); return; }
  if (e.target.closest("[data-unall]")){ fStatus.clear(); fVer.clear(); render(); return; }
  if (e.target.closest("#btnAdd")){ openModal(null); return; }
  const sv = e.target.closest("[data-statver]");
  if (sv){ statVer = sv.dataset.statver; render(); return; }
  if (e.target.closest("#btnAddPlano")){ openPlano(null); return; }
  const pe = e.target.closest("[data-peditar]");
  if (pe){ openPlano(Number(pe.dataset.peditar)); return; }
  const px = e.target.closest("[data-pexcluir]");
  if (px){ const i=Number(px.dataset.pexcluir); if (P[i]){ P.splice(i,1); savePlano(); render(); } return; }
  const hh = e.target.closest("[data-editar-hero]");
  if (hh){ const g = J.find(x=>String(x.id)===hh.dataset.editarHero); if (g) openModal(g); return; }
  const ed = e.target.closest("[data-editar]");
  if (ed){ const g = J.find(x=>String(x.id)===ed.dataset.editar); if (g) openModal(g); return; }
  const ex = e.target.closest("[data-excluir]");
  if (ex){ const g = J.find(x=>String(x.id)===ex.dataset.excluir);
    if (g && confirm(`Excluir "${g.nome}" da biblioteca?`)){ J = J.filter(x=>x.id!==g.id); saveJogos(); render(); }
    return; }
});
render();
boot();
</script>
</body>
